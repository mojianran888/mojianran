async function gasGet() {
  try {
    const res = await fetch(GAS_URL + "?action=getAll");
    return await res.json();
  } catch { return null; }
}

async function gasPostBooking(booking) {
  try {
    await fetch(GAS_URL, { method:"POST", body: JSON.stringify({ action:"saveBooking", ...booking }) });
  } catch {}
}

async function gasPostSettings(rows) {
  try {
    await fetch(GAS_URL, { method:"POST", body: JSON.stringify({ action:"saveSettings", rows }) });
  } catch {}
}

// Local storage for admin-only config (emailCfg, address, notices)
async function storageGet(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
  catch { return null; }
}
async function storageSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); }
  catch {}
}

// ─── EmailJS Sender ───────────────────────────────────────────────────────────
async function sendEmailJS(cfg, booking, notices, address) {
  // cfg: { serviceId, templateId, publicKey }
  if (!cfg?.serviceId || !cfg?.templateId || !cfg?.publicKey) return { ok:false, reason:"未設定 EmailJS" };
  if (!booking.email) return { ok:false, reason:"客戶未填 Email" };
  try {
    const res = await fetch("https://api.emailjs.com/api/v1.0/email/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        service_id: cfg.serviceId,
        template_id: cfg.templateId,
        user_id: cfg.publicKey,
        template_params: {
          to_email:    booking.email,
          to_name:     booking.name,
          service:     booking.service,
          date:        booking.date,
          slot:        booking.slot,
          price:       booking.price.toLocaleString(),
          booking_id:  booking.id,
          address:     address || "（地址將由老師另行通知）",
          notices:     notices || DEFAULT_NOTICES,
          line_url:    LINE_URL,
        },
      }),
    });
    return res.ok ? { ok:true } : { ok:false, reason:`HTTP ${res.status}` };
  } catch(e) {
    return { ok:false, reason: e.message };
  }
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [view,setView]           = useState("booking");
  const [services,setServices]   = useState(DEFAULT_SERVICES);
  const [bookings,setBookings]   = useState([]);
  const [quotas,setQuotas]       = useState({});
  const [defQuota,setDefQuota]   = useState(1);
  const [emailCfg,setEmailCfg]   = useState({ serviceId:"", templateId:"", publicKey:"" });
  const [address,setAddress]     = useState("台中（詳細地址請至後台通知設定填寫）");
  const [notices,setNotices]     = useState(DEFAULT_NOTICES);
  const [loading,setLoading]     = useState(true);
  const [adminAuth,setAdminAuth] = useState(false);

  useEffect(()=>{
    // First load localStorage (fast), then render immediately
    (async()=>{
      try {
        const [ec,ad,nt] = await Promise.all([
          storageGet("mjr:emailCfg"),
          storageGet("mjr:address"),
          storageGet("mjr:notices"),
        ]);
        if(ec) setEmailCfg(ec);
        if(ad) setAddress(ad);
        if(nt!==null) setNotices(nt);
      } catch(e) {}
      setLoading(false); // Show page immediately

      // Then load GAS in background (non-blocking)
      setTimeout(async()=>{
        try {
          const gas = await gasGet();
          if(gas) {
            if(gas.bookings && gas.bookings.length > 0) {
              const bkRows = gas.bookings.filter(r=>r[0]);
              const bkObjects = bkRows.map(r=>({
                id:r[0], name:r[1], phone:r[2], email:r[3], lineId:r[4],
                service:r[5], price:Number(r[6])||0, date:String(r[7]||""), slot:String(r[8]||""), note:r[9]||"",
                createdAt:r[10]||new Date().toISOString()
              }));
              if(bkObjects.length > 0) setBookings(bkObjects);
            }
            if(gas.settings && gas.settings.length > 0) {
              const settingsMap = {};
              gas.settings.forEach(r=>{ if(r[0]) settingsMap[r[0]] = r[1]; });
              if(settingsMap["services"]) { try { setServices(JSON.parse(settingsMap["services"])); } catch {} }
              if(settingsMap["quotas"])   { try { setQuotas(JSON.parse(settingsMap["quotas"])); } catch {} }
              if(settingsMap["defQuota"]) { try { setDefQuota(JSON.parse(settingsMap["defQuota"])); } catch {} }
            }
          }
        } catch(e) { console.error("GAS load error:", e); }
      }, 100);
    })();
  },[]);

  const saveServices = useCallback(async v=>{
    setServices(v);
    await gasPostSettings([["services", JSON.stringify(v)], ["quotas", JSON.stringify(quotas)], ["defQuota", JSON.stringify(defQuota)]]);
  },[quotas, defQuota]);
  const saveBookings = useCallback(async v=>{setBookings(v);},[]);
  const saveQuotas   = useCallback(async v=>{
    setQuotas(v);
    await gasPostSettings([["services", JSON.stringify(services)], ["quotas", JSON.stringify(v)], ["defQuota", JSON.stringify(defQuota)]]);
  },[services, defQuota]);
  const saveDefQuota = useCallback(async v=>{
    setDefQuota(v);
    await gasPostSettings([["services", JSON.stringify(services)], ["quotas", JSON.stringify(quotas)], ["defQuota", JSON.stringify(v)]]);
  },[services, quotas]);
  const saveEmailCfg = useCallback(async v=>{setEmailCfg(v);await storageSet("mjr:emailCfg",v);},[]);
  const saveAddress  = useCallback(async v=>{setAddress(v); await storageSet("mjr:address",v);},[]);
  const saveNotices  = useCallback(async v=>{setNotices(v); await storageSet("mjr:notices",v);},[]);

  const getQuota  = (d,s) => quotas[d]?.[s] ?? defQuota;
  const getBooked = (d,s) => bookings.filter(b=>b.date===d&&b.slot===s).length;
  const isFull    = (d,s) => getBooked(d,s)>=getQuota(d,s);

  if(loading) return (
    <div style={{minHeight:"100vh",background:"#060f0a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <style>{CSS}</style><div className="spin"/><div style={{color:"rgba(232,216,168,0.5)",fontSize:13,letterSpacing:2}}>載入中…</div>
    </div>
  );

  return (
    <div className="app">
      <style>{CSS}</style>
      <header className="header">
        <div><div className="ht">莫江然 · 意識空間</div><div className="hs">看見因才能改命｜意識空間譯者</div></div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <a href={LINE_URL} target="_blank" rel="noreferrer" style={{color:"var(--line)",fontSize:12,border:"1px solid var(--line)",borderRadius:20,padding:"5px 14px",textDecoration:"none",display:"flex",alignItems:"center",gap:5}}>💬 LINE</a>
          <button className={`btab ${view==="booking"?"on":""}`} onClick={()=>setView("booking")}>預約系統</button>
          <button className={`btab ${view==="admin"?"on":""}`} onClick={()=>setView("admin")}>後台管理</button>
        </div>
      </header>
      <div style={{maxWidth:860,margin:"0 auto",padding:"28px 16px"}}>
        {view==="booking"
          ? <BookingView services={services} bookings={bookings} getQuota={getQuota} getBooked={getBooked} isFull={isFull} saveBookings={saveBookings} emailCfg={emailCfg} address={address} notices={notices}/>
          : <AdminView   services={services} bookings={bookings} quotas={quotas} defQuota={defQuota} emailCfg={emailCfg} address={address} notices={notices} adminAuth={adminAuth} setAdminAuth={setAdminAuth} saveServices={saveServices} saveBookings={saveBookings} saveQuotas={saveQuotas} saveDefQuota={saveDefQuota} saveEmailCfg={saveEmailCfg} saveAddress={saveAddress} saveNotices={saveNotices} getQuota={getQuota} getBooked={getBooked}/>}
      </div>
    </div>
  );
}

// ─── Booking View ─────────────────────────────────────────────────────────────
function BookingView({ services, bookings, getQuota, getBooked, isFull, saveBookings, emailCfg, address, notices }) {
  const now=new Date();
  const [step,setStep]   = useState(1);
  const [svc,setSvc]     = useState(null);
  const [year,setYear]   = useState(now.getFullYear());
  const [month,setMonth] = useState(now.getMonth());
  const [date,setDate]   = useState(null);
  const [slot,setSlot]   = useState(null);
  const [form,setForm]   = useState({name:"",phone:"",email:"",lineId:"",note:"",_contactType:"email"});
  const [saving,setSaving]       = useState(false);
  const [emailResult,setEmailResult] = useState(null);
  const [doneId,setDoneId]       = useState("");
  const isMay = now.getMonth()===4;
  const [isBirthday, setIsBirthday] = useState(false);
  const [is8折, setIs8折] = useState(false);

  const activeServices = services.filter(s=>s.active);
  const discountRate = isBirthday ? 0.7 : (is8折 ? 0.8 : null);
  const discountLabel = isBirthday ? "壽星7折" : "8折優惠";

  function isSunday(year, month, day){
    return new Date(year, month, day).getDay() === 0;
  }

  // Three-phase cutoff: morning→afternoon today, afternoon→morning tomorrow, evening→afternoon tomorrow
  function getEarliestBookable() {
    const now = new Date();
    const h = now.getHours();
    const td = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
    const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate()+1);
    const tmr = `${tomorrow.getFullYear()}-${String(tomorrow.getMonth()+1).padStart(2,"0")}-${String(tomorrow.getDate()).padStart(2,"0")}`;
    if(h < 13)  return { date: td,  minSlot: "17:00" }; // 上午 → 當天晚上17:00起
    if(h < 17)  return { date: tmr, minSlot: "10:00" }; // 下午 → 隔天上午10:00起
    return       { date: tmr, minSlot: "13:00" };        // 晚上 → 隔天下午13:00起
  }

  function isSaturday(year, month, day){
    return new Date(year, month, day).getDay() === 6;
  }

  function hasOpenSlot(day){
    if(isSunday(year, month, day)) return false;
    const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const earliest = getEarliestBookable();
    if(ds < earliest.date) return false;
    return TIME_SLOTS.some(s=>{
      if(isSaturday(year,month,day) && s==="19:00") return false;
      if(ds === earliest.date && s < earliest.minSlot) return false;
      return !isFull(ds,s);
    });
  }

  function isSlotBlocked(slot, date) {
    // For 3hr services, check if any of the previous 2 slots are booked with 3hr service
    if (!svc || !THREE_HOUR_IDS.includes(svc.id)) return false;
    const idx = TIME_SLOTS.indexOf(slot);
    // Block last slot (index 6 = 19:00 is ok, but if svc is 3hr, we still allow 19:00)
    // Check if this slot would be blocked by a previous 3hr booking on same date
    for (let i = Math.max(0, idx-2); i < idx; i++) {
      const prevSlot = TIME_SLOTS[i];
      const blockedByBooking = bookings.some(b => b.date===date && b.slot===prevSlot && THREE_HOUR_IDS.includes(
        DEFAULT_SERVICES.find(sv=>sv.name===b.service)?.id
      ));
      if (blockedByBooking) return true;
    }
    return false;
  }

  function isSlotAvailableFor3hr(slot, dateStr) {
    // For 3hr service, also need next 2 slots to not be full
    if (!svc || !THREE_HOUR_IDS.includes(svc.id)) return true;
    const idx = TIME_SLOTS.indexOf(slot);
    // Check next 2 slots exist and are not full
    for (let i = 1; i <= 2; i++) {
      if (idx + i < TIME_SLOTS.length) {
        const nextSlot = TIME_SLOTS[idx + i];
        if (isFull(dateStr, nextSlot)) return false;
      }
    }
    return true;
  }

  async function handleBook(){
    if(!form.name.trim()||!form.phone.trim()){alert("請填寫姓名與電話");return;}
    if(!form.email.trim()&&!form.lineId.trim()){alert("請填寫 Email 或 LINE ID（至少一項）");return;}
    setSaving(true);
    const booking = {
      id:`BK${Date.now()}`,
      name:form.name.trim(),
      phone: form.phone.trim(),
      email: form.email.trim(),
      lineId: form.lineId.trim(),
      contact: form.email.trim() || form.phone.trim(),
      contactType: form.email.trim() ? "email" : "phone",
      note:form.note.trim(),
      date, slot, service:svc.name, price: discountRate ? Math.round(svc.price * discountRate) : svc.price,
      originalPrice: svc.price, discount: discountRate ? discountLabel : null,
      createdAt:new Date().toISOString(), status:"confirmed",
    };
    await saveBookings([...bookings, booking]);
    // Send to Google Sheets via GAS
    gasPostBooking(booking);
    // Send Make.com webhook
    sendMakeWebhook(booking);
    // Send email if email provided
    let eResult = null;
    if(booking.email){
      eResult = await sendEmailJS(emailCfg, booking, notices, address);
    }
    setEmailResult(eResult);
    setDoneId(booking.id);
    setSaving(false);
    setStep(5);
  }

  const steps=[{n:1,l:"選服務"},{n:2,l:"選日期"},{n:3,l:"選時段"},{n:4,l:"填資料"},{n:5,l:"完成"}];

  return (
    <div className="fu">
      {/* Promos */}
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
        <button
          onClick={()=>{setIs8折(b=>!b); if(!is8折) setIsBirthday(false);}}
          style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:"2px solid",transition:"all .2s",textAlign:"left",
            background: is8折?"linear-gradient(135deg,var(--gold),var(--gold-light))":"transparent",
            borderColor: is8折?"var(--gold-light)":"rgba(201,162,39,0.4)",
            color: is8折?"#1a0f00":"var(--gold-light)"}}>
          🌟 {is8折 ? "✓ 8折優惠已套用！" : "即日起至5月31日止，預約享8折優惠，開放預約全年檔期，名額有限。（點我套用）"}
        </button>
        <button
          onClick={()=>{setIsBirthday(b=>!b); if(!isBirthday) setIs8折(false);}}
          style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:"2px solid",transition:"all .2s",
            background: isBirthday?"linear-gradient(135deg,#e87040,#f0a060)":"transparent",
            borderColor: isBirthday?"#f0a060":"rgba(240,160,96,0.4)",
            color: isBirthday?"#fff":"#f0a060"}}>
          🎂 {isBirthday ? "✓ 壽星7折已套用！" : "我是本月壽星（點我享7折）"}
        </button>
      </div>

      {/* Step bar */}
      <div className="steps">
        {steps.map((s,i)=>{
          const done=step>s.n; const act=step===s.n;
          return (
            <div key={s.n} style={{display:"flex",alignItems:"flex-start",flex:1}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,flex:"0 0 auto"}}>
                <div className="sc" style={{background:(done||act)?"linear-gradient(135deg,var(--gold),var(--gold-light))":"var(--surface2)",color:(done||act)?"#1a0f00":"var(--text3)",boxShadow:act?"0 0 14px rgba(201,162,39,0.4)":"none"}}>{done?"✓":s.n}</div>
                <div className="sl" style={{color:(done||act)?"var(--gold-light)":"var(--text3)"}}>{s.l}</div>
              </div>
              {i<steps.length-1&&<div style={{flex:1,height:2,background:done?"linear-gradient(90deg,var(--gold),var(--gold-light))":"rgba(201,162,39,0.15)",margin:"15px 4px 0",minWidth:6}}/>}
            </div>
          );
        })}
      </div>

      {/* Step 1: Service */}
      {step===1&&(
        <div className="fu">
          <ST>☆ 選擇服務項目</ST>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:22}}>
            {activeServices.map(s=>(
              <div key={s.id} className={`svc ${svc?.id===s.id?"svcs":""}`} onClick={()=>setSvc(s)}>
                <div>
                  <div style={{fontWeight:600,fontSize:15}}>{s.name}</div>
                  {s.desc&&<div style={{fontSize:12,color:"var(--text3)",marginTop:3}}>{s.desc}</div>}
                  {ONLINE_SERVICE_IDS.includes(s.id)&&<div style={{fontSize:11,color:"var(--line)",marginTop:4}}>💬 線上服務請加老師個人 LINE：<a href={PERSONAL_LINE} target="_blank" rel="noreferrer" style={{color:"var(--line)"}}>點此加入</a></div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{color:"var(--gold-light)",fontWeight:700,fontSize:17}}>${s.price.toLocaleString()}</div>
                  {discountRate && (
                    <div style={{marginTop:4}}>
                      <div style={{fontSize:11,color:isBirthday?"#f0a060":"var(--green)"}}>{discountLabel}</div>
                      <div style={{color:isBirthday?"#f0a060":"var(--green)",fontWeight:700,fontSize:15}}>${(is8折 && s.discountPrice8) ? s.discountPrice8.toLocaleString() : Math.round(s.price*discountRate).toLocaleString()}</div>
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
          <div style={{textAlign:"right"}}><button className="btn bg" disabled={!svc} onClick={()=>setStep(2)}>選擇日期 →</button></div>
        </div>
      )}

      {/* Step 2: Date */}
      {step===2&&(
        <div className="fu">
          <ST>🗓️ 選擇日期</ST>
          <div className="card" style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <button className="btn bgh bsm" onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);setDate(null);}}>‹ 上月</button>
              <div style={{fontFamily:"'Noto Serif TC',serif",fontSize:18,fontWeight:700,color:"var(--gold-light)",letterSpacing:3}}>{year} · {MONTHS_ZH[month]}</div>
              <button className="btn bgh bsm" onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);setDate(null);}}>下月 ›</button>
            </div>
            <div className="cg">
              {WEEKDAYS_ZH.map(w=><div key={w} className="cdh">{w}</div>)}
              {Array.from({length:firstDayOfMonth(year,month)},(_,i)=><div key={"e"+i}/>)}
              {Array.from({length:daysInMonth(year,month)},(_,i)=>{
                const day=i+1;
                const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
                const past=isPast(year,month,day); const sun=isSunday(year,month,day); const open=!past&&!sun&&hasOpenSlot(day);
                const isTd=ds===todayStr(); const sel=date===ds;
                return (
                  <div key={day} className={`day ${sel?"ds":""} ${(past||sun||(!open&&!past))?"dd":""} ${isTd&&!sel?"dt":""}`} onClick={()=>{if(!past&&!sun&&open){setDate(ds);setSlot(null);}}}>
                    <span>{day}</span>
                    {!past&&!sun&&open&&!sel&&<div className="dot" style={{background:"var(--green)"}}/>}
                    {!past&&!sun&&!open&&<div className="dot" style={{background:"var(--red)"}}/>}
                    {!past&&sun&&!sel&&<div style={{fontSize:9,color:"rgba(232,216,168,0.4)",marginTop:1}}>休</div>}
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{fontSize:12,color:"var(--text3)",display:"flex",gap:16,marginBottom:18}}>
            <span><span style={{color:"var(--green)"}}>●</span> 有名額</span>
            <span><span style={{color:"var(--red)"}}>●</span> 已滿</span>
          </div>
          <NR onBack={()=>setStep(1)} onNext={()=>setStep(3)} dis={!date} nl="選擇時段 →"/>
        </div>
      )}

      {/* Step 3: Slot */}
      {step===3&&(
        <div className="fu">
          <ST>🕐 選擇時段</ST>
          <div style={{fontSize:13,color:"var(--text2)",marginBottom:14}}>📅 {date}</div>
          <div className="sgrid" style={{marginBottom:22}}>
            {TIME_SLOTS.map((s,idx)=>{
              const b=getBooked(date,s); const q=getQuota(date,s); const full=b>=q;
              const is3hr = svc && THREE_HOUR_IDS.includes(svc.id);
              const blocked = isSlotBlocked(s, date);
              const notEnoughSlots = is3hr && idx > TIME_SLOTS.length - 3;
              const no3hrSpace = is3hr && !isSlotAvailableFor3hr(s, date);
              const dateObj = date ? new Date(date) : null;
              const isSat1900 = dateObj && dateObj.getDay()===6 && s==="19:00";
              const isPastSlot = date===todayStr() && (()=>{const [h,m]=s.split(':').map(Number);const t=new Date();return new Date(t.getFullYear(),t.getMonth(),t.getDate(),h,m)<=t;})();
              const earliest = getEarliestBookable();
              const isTooEarly = date < earliest.date || (date === earliest.date && s < earliest.minSlot);
              // 直接隱藏已過和不符合時段
              if(isPastSlot || isTooEarly || isSat1900) return null;
              const disabled = full || blocked || notEnoughSlots || no3hrSpace;
              const reason = full?"已滿":blocked?"已佔用":notEnoughSlots?"時間不足":no3hrSpace?"後續已滿":"";
              return (
                <button key={s} className={`slot ${slot===s?"ss":""}`} disabled={disabled} onClick={()=>setSlot(s)}>
                  <div style={{fontWeight:600}}>{s}</div>
                  <div style={{fontSize:10,marginTop:3,color:disabled?"var(--red)":"var(--green)"}}>
                    {disabled ? (reason||"不可選") : `剩 ${q-b} 名`}
                  </div>
                </button>
              );
            })}
          </div>
          <NR onBack={()=>setStep(2)} onNext={()=>setStep(4)} dis={!slot} nl="填寫資料 →"/>
        </div>
      )}

      {/* Step 4: Form */}
      {step===4&&(
        <div className="fu">
          <ST>✍️ 填寫預約資料</ST>
          {/* Summary */}
          <div className="card cardh" style={{marginBottom:20}}>
            <div style={{fontSize:12,color:"var(--text3)",marginBottom:10}}>預約摘要</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              <span className="tag to">📋 {svc?.name}</span>
              {discountRate
                ? <span className="tag to">💰 <s style={{opacity:.5}}>${svc?.price.toLocaleString()}</s> → ${Math.round((svc?.price||0)*discountRate).toLocaleString()} <span style={{color:isBirthday?"#f0a060":"var(--green)",fontSize:10}}>({discountLabel})</span></span>
                : <span className="tag to">💰 ${svc?.price.toLocaleString()}</span>}
              <span className="tag to">📅 {date}</span>
              <span className="tag to">🕐 {slot}</span>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:16,marginBottom:20}}>
            <div>
              <label>☻ 姓名 <span style={{color:"var(--red)"}}>*</span></label>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="請輸入您的姓名"/>
            </div>
            <div>
              <label>📞 電話 <span style={{color:"var(--red)"}}>*</span></label>
              <input type="tel" value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="請輸入您的手機號碼"/>
            </div>
            <div>
              <label>📧 聯絡方式 <span style={{color:"var(--red)"}}>*</span> <span style={{color:"var(--gold-light)",fontSize:11}}>（擇一填寫）</span></label>
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                <button className={`btab bsm ${!form.lineId&&form.email!==undefined&&form._contactType!=="line"?"on":""}`} onClick={()=>setForm(f=>({...f,_contactType:"email",lineId:""}))}>📧 Email</button>
                <button className={`btab bsm ${form._contactType==="line"?"on":""}`} onClick={()=>setForm(f=>({...f,_contactType:"line",email:""}))}>💬 LINE ID</button>
              </div>
              {form._contactType!=="line"?(
                <>
                  <input type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="請輸入 Email（填寫後系統將自動寄送確認信）"/>
                  {form.email&&<div style={{fontSize:11,color:"var(--gold-light)",marginTop:6}}>✉️ 預約完成後系統將自動寄送確認信，內含注意事項與地址</div>}
                </>
              ):(
                <input value={form.lineId} onChange={e=>setForm(f=>({...f,lineId:e.target.value}))} placeholder="請輸入您的 LINE ID"/>
              )}
            </div>
            <div>
              <label>💬 備註（選填）</label>
              <textarea value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="有任何想提前說明的可以寫在這裡" rows={3} style={{resize:"vertical"}}/>
            </div>
          </div>
          <div style={{padding:"13px 16px",borderRadius:10,background:"rgba(201,162,39,0.06)",border:"1px solid rgba(201,162,39,0.2)",fontSize:12,color:"var(--text2)",lineHeight:1.9,marginBottom:20}}>
            ⚠️ 收到確認通知才算完成預約喔！<br/>期待與您相見 🌙😊
          </div>
          <NR onBack={()=>setStep(3)} onNext={handleBook} dis={saving||!form.name.trim()||!form.phone.trim()||(!form.email.trim()&&!form.lineId.trim())} nl={saving?<>送出中… <span className="spinsm"/></>:"確認送出 ✨"}/>
        </div>
      )}

      {/* Step 5: Done */}
      {step===5&&(
        <div className="fu" style={{textAlign:"center",padding:"44px 0"}}>
          <div style={{fontSize:60,marginBottom:16,filter:"drop-shadow(0 0 20px rgba(201,162,39,0.4))"}}>🌙</div>
          <h2 style={{fontFamily:"'Noto Serif TC',serif",fontSize:24,color:"var(--gold-light)",letterSpacing:3,marginBottom:6}}>預約資料已送出</h2>
          <div style={{fontSize:13,color:"var(--text3)",marginBottom:24}}>預約編號：{doneId}</div>

          {/* Booking summary */}
          <div className="card cardh" style={{maxWidth:360,margin:"0 auto 20px",textAlign:"left"}}>
            <div style={{display:"flex",flexDirection:"column",gap:9,fontSize:14,color:"var(--text2)"}}>
              <div>📋 {svc?.name}</div>
              <div>📅 {date} &nbsp;🕐 {slot}</div>
              <div>👤 {form.name}</div>
              <div>{form.email?"📧 "+form.email:form.lineId?"💬 "+form.lineId:"📞 "+form.phone}</div>
              <div>💰 ${svc?.price.toLocaleString()}</div>
            </div>
          </div>

          {/* Email notification status */}
          {form.email && emailResult && (
            <div className={`nbox ${emailResult.ok?"nok":"nfail"}`} style={{maxWidth:360,margin:"0 auto 16px"}}>
              {emailResult.ok
                ? <><span>✅</span><span>確認信已寄出！請查收您的信箱（包含注意事項與地址）</span></>
                : <><span>⚠️</span><span>Email 發送失敗（{emailResult.reason}）。請透過 LINE 聯繫老師確認。</span></>}
            </div>
          )}
          {form.email && !emailResult && (
            <div className="nbox nwarn" style={{maxWidth:360,margin:"0 auto 16px"}}>
              <span>ℹ️</span><span>Email 通知尚未設定，請透過 LINE 與老師確認預約。</span>
            </div>
          )}
          {!form.email && (
            <div className="nbox ninfo" style={{maxWidth:360,margin:"0 auto 16px"}}>
              <span>📞</span><span>老師將透過 LINE 官方帳號與您確認，請注意訊息通知。</span>
            </div>
          )}

          {/* Inline notices & address on done page */}
          {(notices||address) && (
            <div style={{maxWidth:360,margin:"0 auto 20px",textAlign:"left"}}>
              {notices&&(
                <div style={{background:"rgba(201,162,39,0.07)",border:"1px solid rgba(201,162,39,0.2)",borderRadius:12,padding:16,marginBottom:12}}>
                  <div style={{fontSize:13,fontWeight:700,color:"var(--gold-light)",marginBottom:8}}>📋 注意事項</div>
                  <div style={{fontSize:13,color:"var(--text2)",whiteSpace:"pre-line",lineHeight:2}}>{notices}</div>
                </div>
              )}
              {address&&(
                <div style={{background:"rgba(136,184,255,0.07)",border:"1px solid rgba(136,184,255,0.2)",borderRadius:12,padding:16}}>
                  <div style={{fontSize:13,fontWeight:700,color:"var(--blue)",marginBottom:8}}>📍 地址</div>
                  <div style={{fontSize:14,color:"var(--text2)",lineHeight:1.8}}>{address}</div>
                </div>
              )}
            </div>
          )}

          <a href={LINE_URL} target="_blank" rel="noreferrer"
            style={{display:"inline-flex",alignItems:"center",gap:8,background:"var(--line)",color:"#fff",padding:"12px 28px",borderRadius:30,textDecoration:"none",fontWeight:700,fontSize:15,transition:"all .2s"}}>
            💬 前往 LINE 確認預約
          </a>
          <div style={{maxWidth:360,margin:"20px auto 0",padding:"14px 16px",borderRadius:12,background:"rgba(255,80,80,0.06)",border:"1px solid rgba(255,80,80,0.2)",fontSize:12,color:"var(--text2)",lineHeight:2,textAlign:"left"}}>
            ⚠️ <strong>如需取消或更改時段，請於 24 小時前告知</strong><br/>
            📌 取消方式：加入老師個人 LINE 聯繫<br/>
            <a href={PERSONAL_LINE} target="_blank" rel="noreferrer" style={{color:"var(--line)",wordBreak:"break-all"}}>{PERSONAL_LINE}</a>
          </div>
          <div style={{marginTop:20}}>
            <button className="btn bgh" onClick={()=>{setStep(1);setSvc(null);setDate(null);setSlot(null);setForm({name:"",phone:"",email:"",lineId:"",note:"",_contactType:"email"});setEmailResult(null);}}>再次預約</button>
          </div>
        </div>
      )}
    </div>
  );
}

          <div key={s.l} className="card cardh" style={{textAlign:"center"}}>
            <div style={{fontSize:22,marginBottom:6}}>{s.i}</div>
            <div style={{fontSize:20,fontWeight:700,color:"var(--gold-light)",fontFamily:"'Noto Serif TC',serif"}}>{s.v}</div>

// ─── Admin: Notify Settings ───────────────────────────────────────────────────
function AdminNotify({ emailCfg, address, notices, saveEmailCfg, saveAddress, saveNotices }) {

            {[["📋 服務項目","現場諮詢能量調頻"],["📅 預約日期","（客戶選擇的日期）"],["🕐 預約時間","（客戶選擇的時段）"],["💰 服務費用","$1,800"],["🔖 預約編號","BK_XXXXXXXXX"]].map(([l,v])=>(
              <div key={l} className="erow"><div className="elabel">{l}</div><div>{v}</div></div>

// ─── Admin: Bookings ──────────────────────────────────────────────────────────
function AdminBookings({ bookings, saveBookings }) {
  const [q,setQ]     = useState("");
  const [sort,setSort] = useState("newest");
  let list=[...bookings];
  if(q) list=list.filter(b=>b.name.includes(q)||b.contact?.includes(q)||b.phone?.includes(q)||b.date.includes(q)||b.service.includes(q));
  list.sort((a,b)=>sort==="newest"?(b.createdAt||"").localeCompare(a.createdAt||""):(a.date||"").localeCompare(b.date||"")||(a.slot||"").localeCompare(b.slot||""));
  async function del(id){if(!confirm("確定刪除？"))return; await saveBookings(bookings.filter(b=>b.id!==id));}
  return (
    <div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="搜尋姓名、Email、電話、服務…" style={{maxWidth:280}}/>
        <select value={sort} onChange={e=>setSort(e.target.value)} style={{width:"auto"}}>
          <option value="newest">最新建立</option>
          <option value="date">依日期排序</option>
        </select>
        <span style={{fontSize:12,color:"var(--text3)"}}>共 {list.length} 筆</span>
      </div>
      {list.length===0?(
        <div style={{textAlign:"center",padding:48,color:"var(--text3)"}}>尚無預約紀錄</div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {list.map(b=>(
            <div key={b.id} className="card">
              <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:5}}>
                    <span style={{fontWeight:700,fontSize:15}}>{b.name}</span>
                    <span className="tag tgr" style={{fontSize:10}}>已確認</span>
                  </div>
                  <div style={{fontSize:13,color:"var(--text2)",marginBottom:3}}>{b.service}</div>
                  <div style={{fontSize:12,color:"var(--text3)"}}>
                    {b.email&&<span>📧 {b.email}</span>}
                    {b.phone&&<span>📞 {b.phone}</span>}
                  </div>
                  {b.note&&<div style={{fontSize:12,color:"var(--text3)",fontStyle:"italic",marginTop:3}}>備註：{b.note}</div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{color:"var(--gold-light)",fontWeight:700,fontSize:16}}>${b.price.toLocaleString()}</div>
                  <div style={{fontSize:12,color:"var(--text3)",marginTop:3}}>{b.date} {b.slot}</div>
                  <button className="btn bgh bsm" style={{fontSize:11,color:"var(--red)",borderColor:"rgba(240,112,112,0.3)",marginTop:8}} onClick={()=>del(b.id)}>刪除</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Admin: Services ──────────────────────────────────────────────────────────
function AdminServices({ services, saveServices }) {
  const [editing,setEditing]=useState(null); const [form,setForm]=useState({});
  const [adding,setAdding]=useState(false); const [nw,setNw]=useState({name:"",desc:"",price:""});
  async function saveEdit(id){await saveServices(services.map(s=>s.id===id?{...s,...form,price:parseInt(form.price)||0}:s));setEditing(null);}
  async function toggle(id){await saveServices(services.map(s=>s.id===id?{...s,active:!s.active}:s));}
  async function add(){if(!nw.name.trim())return alert("請填服務名稱");await saveServices([...services,{id:Date.now(),name:nw.name.trim(),desc:nw.desc.trim(),price:parseInt(nw.price)||0,active:true}]);setNw({name:"",desc:"",price:""});setAdding(false);}
  async function del(id){if(!confirm("確定刪除？"))return;await saveServices(services.filter(s=>s.id!==id));}
  return (
    <div>
      <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>
        {services.map(s=>(
          <div key={s.id} className="card" style={{opacity:s.active?1:.5}}>
            {editing===s.id?(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="服務名稱"/>
                <input value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} placeholder="說明"/>
                <input value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))} type="number" placeholder="價格"/>
                <div style={{display:"flex",gap:8}}><button className="btn bg bsm" onClick={()=>saveEdit(s.id)}>儲存</button><button className="btn bgh bsm" onClick={()=>setEditing(null)}>取消</button></div>
              </div>
            ):(
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                <div><div style={{fontWeight:600,fontSize:15}}>{s.name}</div>{s.desc&&<div style={{fontSize:12,color:"var(--text3)",marginTop:2}}>{s.desc}</div>}<div style={{color:"var(--gold-light)",fontWeight:700,marginTop:6}}>${s.price.toLocaleString()}</div></div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button className="btn bgh bsm" onClick={()=>toggle(s.id)}>{s.active?"隱藏":"顯示"}</button>
                  <button className="btn bg bsm" onClick={()=>{setEditing(s.id);setForm({name:s.name,desc:s.desc,price:s.price});}}>編輯</button>
                  <button className="btn bgh bsm" style={{color:"var(--red)",borderColor:"rgba(240,112,112,0.3)"}} onClick={()=>del(s.id)}>刪除</button>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
      {adding?(
        <div className="card" style={{marginBottom:12}}>
          <div style={{fontSize:14,color:"var(--gold-light)",marginBottom:12,fontWeight:600}}>新增服務</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <input value={nw.name} onChange={e=>setNw(f=>({...f,name:e.target.value}))} placeholder="服務名稱 *"/>
            <input value={nw.desc} onChange={e=>setNw(f=>({...f,desc:e.target.value}))} placeholder="說明（選填）"/>
            <input value={nw.price} onChange={e=>setNw(f=>({...f,price:e.target.value}))} type="number" placeholder="價格"/>
            <div style={{display:"flex",gap:8}}><button className="btn bg bsm" onClick={add}>新增</button><button className="btn bgh bsm" onClick={()=>setAdding(false)}>取消</button></div>
          </div>
        </div>
      ):(
        <button className="btn bgh" style={{width:"100%"}} onClick={()=>setAdding(true)}>＋ 新增服務項目</button>
      )}
    </div>
  );
}

// ─── Admin: Quotas ────────────────────────────────────────────────────────────
function AdminQuotas({ quotas, defQuota, saveQuotas, saveDefQuota, getQuota, getBooked, bookings }) {
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear()); const [month,setMonth]=useState(now.getMonth()); const [date,setDate]=useState(null);
  async function setSlotQ(d,slot,val){const q={...quotas};if(!q[d])q[d]={};q[d][slot]=Math.max(0,parseInt(val)||0);await saveQuotas(q);}
  async function resetDay(d){if(!confirm(`重置 ${d} 的名額？`))return;const q={...quotas};delete q[d];await saveQuotas(q);}
  return (
    <div>
      <div className="card cardh" style={{marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
          <span style={{fontSize:14,color:"var(--text2)"}}>預設每時段名額：</span>
          <input type="number" value={defQuota} min={0} max={20} onChange={e=>saveDefQuota(Math.max(0,parseInt(e.target.value)||0))} style={{width:80}}/>
          <span style={{fontSize:12,color:"var(--text3)"}}>人</span>
        </div>
      </div>
      <div className="card" style={{marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <button className="btn bgh bsm" onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);setDate(null);}}>‹</button>
          <div style={{fontFamily:"'Noto Serif TC',serif",fontSize:18,fontWeight:700,color:"var(--gold-light)",letterSpacing:3}}>{year} · {MONTHS_ZH[month]}</div>
          <button className="btn bgh bsm" onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);setDate(null);}}>›</button>
        </div>
        <div className="cg">
          {WEEKDAYS_ZH.map(w=><div key={w} className="cdh">{w}</div>)}
          {Array.from({length:firstDayOfMonth(year,month)},(_,i)=><div key={"e"+i}/>)}
          {Array.from({length:daysInMonth(year,month)},(_,i)=>{
            const day=i+1;
            const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const sel=date===ds; const hc=!!quotas[ds]; const cnt=bookings.filter(b=>b.date===ds).length;
            return (
              <div key={day} className={`day ${sel?"ds":""}`} onClick={()=>setDate(ds)}>
                <span>{day}</span>
                <div style={{display:"flex",gap:2,marginTop:2}}>
                  {hc&&!sel&&<div className="dot" style={{background:"var(--gold-light)"}}/>}
                  {cnt>0&&!sel&&<div className="dot" style={{background:"var(--green)"}}/>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {date&&(
        <div className="fu">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
            <div style={{fontSize:15,color:"var(--gold-light)",fontWeight:600}}>📍 {date} 各時段名額</div>
            {quotas[date]&&<button className="btn bgh bsm" onClick={()=>resetDay(date)}>重置預設</button>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10}}>
            {TIME_SLOTS.map(slot=>{
              const b=getBooked(date,slot); const q=getQuota(date,slot);
              return (
                <div key={slot} className="card">
                  <div style={{fontWeight:600,fontSize:15,marginBottom:6}}>{slot}</div>
                  <div style={{fontSize:12,color:"var(--text3)",marginBottom:8}}>已預約 <span style={{color:b>0?"var(--green)":"var(--text2)"}}>{b}</span> / {q} 人</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <input type="number" min={0} max={20} value={q} onChange={e=>setSlotQ(date,slot,e.target.value)} style={{width:64,padding:"7px 10px",textAlign:"center"}}/>
                    <span style={{fontSize:11,color:"var(--text3)"}}>名額</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Shared ───────────────────────────────────────────────────────────────────
function ST({ children }) {
  return <h3 style={{fontFamily:"'Noto Serif TC',serif",fontSize:18,fontWeight:700,color:"var(--gold-light)",marginBottom:18,letterSpacing:2}}>{children}</h3>;
}
function NR({ onBack, onNext, dis, nl }) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <button className="btn bgh" onClick={onBack}>← 返回</button>
      <button className="btn bg" disabled={dis} onClick={onNext}>{nl}</button>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
