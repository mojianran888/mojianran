<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莫江然・意識空間｜預約系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');

  :root {
    --dark: #1a2a1a;
    --dark2: #243324;
    --card: #1e2e1e;
    --gold: #c9a84c;
    --gold-light: #e2c47a;
    --cream: #f5f0e8;
    --text-muted: #8a9e8a;
    --locked: #4a3a3a;
    --locked-text: #7a5a5a;
    --success: #4caf6e;
    --warning: #e8c547;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ─── HEADER ─── */
  .header {
    background: linear-gradient(160deg, #1e3320 0%, #0f1f10 100%);
    padding: 28px 20px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(201,168,76,0.3);
  }
  .header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.08em;
  }
  .header p {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.15em;
  }

  /* ─── BIRTHDAY TOGGLE ─── */
  .birthday-banner {
    margin: 16px 16px 0;
    background: linear-gradient(135deg, #2a1f0a, #3a2a10);
    border: 1.5px solid var(--gold);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }
  .birthday-banner:active { background: linear-gradient(135deg, #3a2f1a, #4a3a20); }
  .birthday-banner .left { display: flex; align-items: center; gap: 10px; }
  .birthday-banner .icon { font-size: 1.4rem; }
  .birthday-banner .label { font-size: 0.9rem; color: var(--gold-light); font-weight: 500; }
  .birthday-banner .sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
  .toggle-switch {
    width: 44px; height: 24px;
    background: #333;
    border-radius: 12px;
    position: relative;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    background: white;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.3s;
  }
  .toggle-switch.active { background: var(--gold); }
  .toggle-switch.active::after { transform: translateX(20px); }

  /* ─── NAV TABS ─── */
  .nav-tabs {
    display: flex;
    margin: 16px 16px 0;
    background: var(--dark2);
    border-radius: var(--radius);
    padding: 4px;
    gap: 4px;
  }
  .nav-tab {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    border-radius: 8px;
    font-size: 0.8rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: transparent;
  }
  .nav-tab.active {
    background: var(--gold);
    color: var(--dark);
    font-weight: 500;
  }
  .nav-tab a { color: inherit; text-decoration: none; }

  /* ─── SECTION VIEWS ─── */
  .view { display: none; }
  .view.active { display: block; }

  /* ─── SERVICE CARDS ─── */
  .services-list { padding: 12px 16px 0; }
  .service-card {
    background: var(--card);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .service-card:hover { border-color: rgba(201,168,76,0.4); }
  .service-card.selected {
    border-color: var(--gold);
    background: #243320;
  }
  .service-card .top { display: flex; justify-content: space-between; align-items: flex-start; }
  .service-card .name {
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--cream);
    flex: 1;
  }
  .service-card .price {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--gold);
    white-space: nowrap;
    margin-left: 12px;
  }
  .service-card .price.discounted { color: var(--gold-light); }
  .service-card .price-original {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-decoration: line-through;
    text-align: right;
    margin-left: 12px;
  }
  .service-card .desc {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 6px;
    line-height: 1.6;
  }
  .service-card .tag {
    display: inline-block;
    font-size: 0.68rem;
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    border-radius: 4px;
    padding: 2px 7px;
    margin-top: 8px;
    margin-right: 4px;
  }
  .service-card .tag.line-tag {
    background: rgba(0,185,0,0.15);
    color: #4caf50;
  }
  .service-card .line-link {
    color: #4caf50;
    font-size: 0.75rem;
    text-decoration: underline;
  }
  .selected-mark {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 20px; height: 20px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    color: var(--dark);
    display: none;
  }
  .service-card.selected .selected-mark { display: flex; }

  /* ─── CONTINUE BTN ─── */
  .sticky-btn {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 16px;
    background: linear-gradient(to top, var(--dark) 60%, transparent);
    z-index: 100;
  }
  .btn-main {
    width: 100%;
    padding: 16px;
    background: var(--gold);
    color: var(--dark);
    border: none;
    border-radius: var(--radius);
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s;
  }
  .btn-main:hover { background: var(--gold-light); }
  .btn-main:disabled { background: #444; color: #666; cursor: not-allowed; }

  /* ─── DATE PICKER ─── */
  .section-title {
    font-size: 0.78rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    padding: 20px 16px 8px;
    text-transform: uppercase;
  }

  .calendar-wrap { padding: 0 16px; }
  .calendar-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0 12px;
  }
  .calendar-nav button {
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--gold);
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .calendar-nav .month-label {
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    color: var(--cream);
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-day-header {
    text-align: center;
    font-size: 0.68rem;
    color: var(--text-muted);
    padding: 4px 0 8px;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    font-size: 0.82rem;
    cursor: pointer;
    background: var(--dark2);
    color: var(--cream);
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .cal-day:hover:not(.disabled):not(.empty) { border-color: var(--gold); }
  .cal-day.selected { background: var(--gold); color: var(--dark); font-weight: 700; }
  .cal-day.disabled { color: #444; cursor: not-allowed; background: transparent; }
  .cal-day.empty { background: transparent; cursor: default; }
  .cal-day.today { border-color: rgba(201,168,76,0.4); }

  /* ─── TIME SLOTS ─── */
  .slots-wrap { padding: 0 16px; }
  .slots-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 8px;
  }
  .slot {
    padding: 14px 8px;
    text-align: center;
    background: var(--card);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
  }
  .slot .time { font-size: 0.9rem; font-weight: 500; color: var(--cream); }
  .slot .avail { font-size: 0.65rem; color: var(--text-muted); margin-top: 3px; }
  .slot:hover:not(.locked):not(.restricted) { border-color: var(--gold); }
  .slot.selected { background: #243320; border-color: var(--gold); }
  .slot.locked {
    background: var(--locked);
    border-color: rgba(100,60,60,0.3);
    cursor: not-allowed;
  }
  .slot.locked .time { color: var(--locked-text); }
  .slot.locked .avail { color: #5a4444; }
  .slot.restricted {
    background: #1a1a2a;
    border-color: rgba(80,80,120,0.3);
    cursor: not-allowed;
  }
  .slot.restricted .time { color: #555577; }
  .slot.restricted .avail { color: #444466; font-size: 0.6rem; }

  .no-slots-msg {
    text-align: center;
    padding: 30px 20px;
    color: var(--text-muted);
    font-size: 0.85rem;
    line-height: 1.7;
  }

  .early-cutoff-note {
    background: rgba(232,197,71,0.08);
    border: 1px solid rgba(232,197,71,0.25);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.75rem;
    color: var(--gold-light);
    margin-bottom: 12px;
    line-height: 1.6;
  }

  /* ─── FORM ─── */
  .form-wrap { padding: 0 16px; }
  .form-field { margin-bottom: 14px; }
  .form-field label {
    display: block;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.08em;
  }
  .form-field input, .form-field textarea {
    width: 100%;
    padding: 13px 14px;
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    color: var(--cream);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-field input:focus, .form-field textarea:focus {
    border-color: var(--gold);
  }
  .form-field input::placeholder { color: #555; }

  .cancel-notice {
    background: rgba(201,168,76,0.08);
    border-left: 3px solid var(--gold);
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    margin: 16px 0;
  }
  .cancel-notice p {
    font-size: 0.78rem;
    color: var(--gold-light);
    line-height: 1.7;
  }
  .cancel-notice a { color: var(--gold); }

  /* ─── BOOKING SUMMARY ─── */
  .summary-card {
    background: var(--card);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: var(--radius);
    padding: 16px;
    margin: 0 16px 16px;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 0.82rem;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .s-label { color: var(--text-muted); flex-shrink: 0; margin-right: 12px; }
  .summary-row .s-value { color: var(--cream); text-align: right; }
  .summary-row.total .s-value { color: var(--gold); font-size: 1rem; font-weight: 700; }

  /* ─── SUCCESS ─── */
  .success-wrap {
    text-align: center;
    padding: 60px 24px 40px;
  }
  .success-icon { font-size: 4rem; margin-bottom: 16px; }
  .success-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.3rem;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .success-sub { font-size: 0.85rem; color: var(--text-muted); line-height: 1.8; }
  .success-sub a { color: var(--gold); }

  /* ─── ADMIN ─── */
  .admin-wrap { padding: 16px; }
  .admin-login {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    margin-top: 8px;
  }
  .admin-login h3 {
    font-family: 'Noto Serif TC', serif;
    color: var(--gold);
    margin-bottom: 16px;
    font-size: 1rem;
  }
  .admin-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  .admin-table th {
    text-align: left;
    font-size: 0.72rem;
    color: var(--text-muted);
    padding: 8px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    letter-spacing: 0.08em;
  }
  .admin-table td {
    font-size: 0.78rem;
    color: var(--cream);
    padding: 10px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: top;
  }
  .admin-table tr:last-child td { border-bottom: none; }

  .step-indicator {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 6px;
  }
  .step-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(201,168,76,0.2);
  }
  .step-dot.active { background: var(--gold); }
  .step-line { flex: 1; height: 1px; background: rgba(201,168,76,0.15); }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--text-muted);
    cursor: pointer;
    padding: 12px 16px;
  }
  .back-link:hover { color: var(--gold); }

  .loading-spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(201,168,76,0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .msg-box {
    margin: 0 16px 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 0.8rem;
    line-height: 1.6;
    display: none;
  }
  .msg-box.error { background: rgba(200,60,60,0.15); border: 1px solid rgba(200,60,60,0.3); color: #e88; }
  .msg-box.info { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25); color: var(--gold-light); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>莫江然・意識空間</h1>
  <p>看見因才能改命｜意識空間譯者</p>
</div>

<!-- BIRTHDAY TOGGLE -->
<div class="birthday-banner" id="birthdayBanner" onclick="toggleBirthday()">
  <div class="left">
    <div class="icon">🎂</div>
    <div>
      <div class="label">本月壽星 8 折優惠</div>
      <div class="sub">點選啟用，所有服務自動折扣</div>
    </div>
  </div>
  <div class="toggle-switch" id="birthdayToggle"></div>
</div>

<!-- NAV TABS -->
<div class="nav-tabs">
  <button class="nav-tab active" onclick="showTab('booking')">預約系統</button>
  <button class="nav-tab" onclick="window.open('https://lin.ee/pscg9XZ','_blank')"><a>LINE 聯絡</a></button>
  <button class="nav-tab" onclick="showTab('admin')">後台管理</button>
</div>

<!-- ════════════════════════════════════ -->
<!-- VIEW: BOOKING FLOW -->
<!-- ════════════════════════════════════ -->
<div class="view active" id="view-booking">

  <!-- STEP 1: SERVICE SELECTION -->
  <div id="step1">
    <div class="section-title">選擇服務項目</div>
    <div class="services-list" id="servicesList"></div>
    <div style="height:80px"></div>
    <div class="sticky-btn">
      <button class="btn-main" id="toStep2Btn" onclick="goToStep2()" disabled>選擇日期與時間 →</button>
    </div>
  </div>

  <!-- STEP 2: DATE + TIME -->
  <div id="step2" style="display:none">
    <div class="back-link" onclick="goBack(1)">← 返回服務選擇</div>

    <div class="section-title">選擇預約日期</div>
    <div class="calendar-wrap">
      <div class="calendar-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="month-label" id="monthLabel"></div>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div id="timeSection" style="display:none">
      <div class="section-title">選擇時段</div>
      <div class="slots-wrap">
        <div class="early-cutoff-note" id="cutoffNote" style="display:none"></div>
        <div class="slots-grid" id="slotsGrid"></div>
        <div id="noSlotsMsg" class="no-slots-msg" style="display:none"></div>
      </div>
    </div>

    <div style="height:80px"></div>
    <div class="sticky-btn">
      <button class="btn-main" id="toStep3Btn" onclick="goToStep3()" disabled>填寫資料 →</button>
    </div>
  </div>

  <!-- STEP 3: FORM -->
  <div id="step3" style="display:none">
    <div class="back-link" onclick="goBack(2)">← 返回選擇時段</div>

    <div class="section-title">確認預約資訊</div>
    <div class="summary-card" id="summaryCard"></div>

    <div class="section-title">填寫資料</div>
    <div class="form-wrap">
      <div class="form-field">
        <label>姓名 *</label>
        <input type="text" id="inputName" placeholder="請輸入您的姓名" required>
      </div>
      <div class="form-field">
        <label>電話 *</label>
        <input type="tel" id="inputPhone" placeholder="請輸入聯絡電話" required>
      </div>
      <div class="form-field">
        <label>電子信箱（選填，用於接收確認信）</label>
        <input type="email" id="inputEmail" placeholder="yourname@gmail.com">
      </div>
      <div class="form-field">
        <label>備註（選填）</label>
        <textarea id="inputNote" rows="3" placeholder="如有特殊需求或想說的話…"></textarea>
      </div>

      <!-- CANCEL NOTICE -->
      <div class="cancel-notice">
        <p>⚠️ 取消預約請於前一日至官方帳號告知<br>
        LINE 官方帳號：<a href="https://lin.ee/pscg9XZ" target="_blank">點此聯絡</a></p>
      </div>
    </div>

    <div class="msg-box error" id="formError"></div>
    <div style="height:80px"></div>
    <div class="sticky-btn">
      <button class="btn-main" id="submitBtn" onclick="submitBooking()">確認送出預約 ✓</button>
    </div>
  </div>

  <!-- STEP 4: SUCCESS -->
  <div id="step4" style="display:none">
    <div class="success-wrap">
      <div class="success-icon" style="font-size:2.8rem;letter-spacing:2px">🌟 ✦ 🌟</div>
      <div class="success-title">預約成功</div>
      <div class="success-sub" id="successMsg"></div>
      <div style="margin-top:28px">
        <button onclick="location.reload()" style="background:none;border:1px solid rgba(201,168,76,0.4);color:var(--gold);border-radius:10px;padding:12px 28px;font-size:0.85rem;cursor:pointer;font-family:inherit">
          ← 返回首頁
        </button>
      </div>
    </div>
  </div>

</div>

<!-- ════════════════════════════════════ -->
<!-- VIEW: ADMIN -->
<!-- ════════════════════════════════════ -->
<div class="view" id="view-admin">
  <div class="admin-wrap">
    <div id="adminLoginPanel">
      <div class="admin-login">
        <h3>🔐 後台管理</h3>
        <div class="form-field">
          <label>管理員密碼</label>
          <input type="password" id="adminPwd" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')adminLogin()">
        </div>
        <button class="btn-main" onclick="adminLogin()" style="margin-top:8px">登入</button>
        <div class="msg-box error" id="adminError" style="margin:10px 0 0;display:none"></div>
      </div>
    </div>

    <div id="adminPanel" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0">
        <div style="font-size:0.85rem;color:var(--gold)">📋 預約清單</div>
        <button onclick="adminLogout()" style="font-size:0.72rem;color:var(--text-muted);background:none;border:none;cursor:pointer">登出</button>
      </div>
      <div id="adminTableWrap">
        <div style="text-align:center;padding:30px;color:var(--text-muted);font-size:0.85rem">
          <div class="loading-spinner"></div>載入中…
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════ -->
<script>
// ─── CONFIG ───────────────────────────
const CONFIG = {
  EMAILJS_SERVICE: 'service_5ylrv7f',
  EMAILJS_TEMPLATE: 'template_wqugwja',

// ─── CALENDAR ─────────────────────────
const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DAY_HEADERS = ['日','一','二','三','四','五','六'];

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('monthLabel').textContent = `${calYear} 年 ${MONTH_NAMES[calMonth]}`;
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';

  DAY_HEADERS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-header';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(calYear, calMonth, d);
    const dow = date.getDay(); // 0=Sun,6=Sat
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;

    // Disable: past, Sunday (0), Saturday after 15:00 handled in slots
    const isPast = date < today;
    const isSunday = dow === 0;
    const isDisabled = isPast || isSunday;

    if (isDisabled) {
      el.classList.add('disabled');
    } else {
      if (date.toDateString() === today.toDateString()) el.classList.add('today');
      if (selectedDate && date.toDateString() === selectedDate.toDateString()) el.classList.add('selected');
      el.onclick = () => selectDate(date);
    }
    grid.appendChild(el);
  }
}

  document.getElementById('toStep3Btn').disabled = true;

  renderTimeSlots();
  document.getElementById('timeSection').style.display = 'block';
}

// ─── TIME SLOTS ───────────────────────
function getEarliestAllowedSession() {
  // Returns minimum session: 'morning'|'noon'|'evening'
  const now = new Date();
  const h = now.getHours();
  if (h >= 0 && h < 12) return 'evening_today'; // can only book evening today
  if (h >= 12 && h < 16) return 'morning_next'; // book tomorrow morning
  return 'noon_next'; // book tomorrow noon
}

function getSessionForHour(h) {
  if (h < 12) return 'morning';
  if (h < 16) return 'noon';
  return 'evening';
}

function isSlotRestricted(date, slotHour) {
  const today = new Date(); today.setHours(0,0,0,0);
  const selDate = new Date(date); selDate.setHours(0,0,0,0);
  const diffDays = Math.round((selDate - today) / 86400000);
  const nowHour = new Date().getHours();

  // 超過1天以後 → 全部可選
  if (diffDays > 1) return false;

  if (diffDays === 0) {
    // 今天
    if (nowHour < 12) return slotHour < 16;      // 早上現在 → 只能選晚上(16+)
    return true;                                   // 中午/晚上現在 → 今天全鎖
  }

  if (diffDays === 1) {
    // 明天
    if (nowHour >= 12 && nowHour < 16) return slotHour >= 12; // 中午現在 → 明天只能選早上(<12)
    if (nowHour >= 16) return slotHour < 12 || slotHour >= 16; // 晚上現在 → 明天只能選中午(12-15)
    return false; // 早上現在 → 明天全部可選
  }

  return false;
}

function renderTimeSlots() {
  const grid = document.getElementById('slotsGrid');
  const noMsg = document.getElementById('noSlotsMsg');
  const note = document.getElementById('cutoffNote');
  grid.innerHTML = '';
  noMsg.style.display = 'none';
  note.style.display = 'none';

  if (!selectedDate) return;

  const dow = selectedDate.getDay();
  const dateStr = formatDate(selectedDate);
  const booked = bookedSlots[dateStr] || [];
  const isSaturday = dow === 6;
  const service = selectedService;
  const durationH = service?.duration || 1;

  // All possible hours Mon-Fri 10-19, Sat 10-15
  const maxHour = isSaturday ? 15 : 19;
  const allHours = [];
  for (let h = 10; h <= maxHour - durationH; h++) {
    allHours.push(h);
  }

  if (allHours.length === 0) {
    noMsg.style.display = 'block';
    noMsg.innerHTML = '六曜日（週六）服務時段為 10:00–15:00<br>本服務時長較長，今日無可用時段';
    return;
  }

  // Show cutoff note
  const nowH = new Date().getHours();
  const today = new Date(); today.setHours(0,0,0,0);
  const selDate = new Date(selectedDate); selDate.setHours(0,0,0,0);
  const diffDays = Math.round((selDate - today) / 86400000);

  if (diffDays <= 1) {
    const msgs = {
      0: '今日限預約「晚上」時段（16:00 以後）',
      1: nowH >= 12 && nowH < 16 ? '明日限預約「早上」時段（12:00 以前）' :
         nowH >= 16 ? '明日限預約「中午」時段（12:00–16:00）' : ''
    };
    if (msgs[diffDays]) {
      note.textContent = '⏰ ' + msgs[diffDays];
      note.style.display = 'block';
    }
  }

  let hasAvail = false;

  allHours.forEach(h => {
    const timeStr = `${String(h).padStart(2,'0')}:00`;
    const isBooked = booked.includes(timeStr);
    // Check if entire duration block is free
    let blockBooked = false;
    for (let bh = h; bh < h + durationH; bh++) {
      if (booked.includes(`${String(bh).padStart(2,'0')}:00`)) { blockBooked = true; break; }
    }

    const restricted = isSlotRestricted(selectedDate, h);
    const locked = blockBooked;

    const el = document.createElement('div');
    el.className = 'slot';
    if (locked) el.classList.add('locked');
    else if (restricted) el.classList.add('restricted');
    else hasAvail = true;

    if (selectedSlot === timeStr && !locked && !restricted) el.classList.add('selected');

    let label = getSessionLabel(h);
    el.innerHTML = `<div class="time">${timeStr}</div><div class="avail">${locked ? '已預約' : restricted ? '今日不可約' : label}</div>`;

    if (!locked && !restricted) {
      el.onclick = () => selectSlot(timeStr, el);
    }
    grid.appendChild(el);
  });

  if (!hasAvail) {
    noMsg.style.display = 'block';
    noMsg.textContent = '此日期目前無可預約時段，請選擇其他日期 🙏';
  }
}

function getSessionLabel(h) {
  if (h < 12) return '早上';
  if (h < 16) return '中午';
  return '晚上';
}

function selectSlot(timeStr, el) {
  selectedSlot = timeStr;
  document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('toStep3Btn').disabled = false;
}

// ─── SUBMIT ───────────────────────────
async function submitBooking() {
  const name = document.getElementById('inputName').value.trim();
  const phone = document.getElementById('inputPhone').value.trim();
  const email = document.getElementById('inputEmail').value.trim();
  const note = document.getElementById('inputNote').value.trim();
  const errBox = document.getElementById('formError');

  if (!name || !phone) {
    errBox.textContent = '⚠️ 姓名和電話為必填欄位';
    errBox.style.display = 'block';
    return;
  }
  errBox.style.display = 'none';

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>送出中…';

  const s = selectedService;
  const price = getDisplayPrice(s);
  const dateStr = formatDate(selectedDate);
  const dateLabel = selectedDate.toLocaleDateString('zh-TW', {year:'numeric',month:'long',day:'numeric',weekday:'short'});

  const payload = {
    event: 'new_booking',
    booking_id: 'BK' + Date.now(),
    name,
    phone,
    email,
    service: s.name,
    price: price,
    date: dateLabel,
    slot: selectedSlot,
    dateSlot: dateLabel + ' ' + selectedSlot,
    note,
    created_at: new Date().toISOString(),
  };

  try {
    // 1. Make webhook → Google Sheets
    const img = new Image();
    img.src = CONFIG.MAKE_WEBHOOK + '?' + new URLSearchParams(payload).toString();
    await fetch(CONFIG.MAKE_WEBHOOK, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload),
      mode: 'no-cors',
    });

    // 2. EmailJS confirmation (if email provided)
    if (email && typeof emailjs !== 'undefined') {
      await emailjs.send(CONFIG.EMAILJS_SERVICE, CONFIG.EMAILJS_TEMPLATE, {
        to_name: name,
        to_email: email,
        service_name: s.name,
        booking_date: dateLabel,
        booking_time: selectedSlot,
        booking_price: `$${price.toLocaleString()}`,
        line_url: CONFIG.LINE_URL,
      });
    }

    // 3. Block slot locally
    if (!bookedSlots[dateStr]) bookedSlots[dateStr] = [];
    for (let h = 0; h < s.duration; h++) {
      const bh = parseInt(selectedSlot.split(':')[0]) + h;
      bookedSlots[dateStr].push(`${String(bh).padStart(2,'0')}:00`);
    }

    showStep(4);
    let successHTML = `
      <b>${name}</b> 您好，您的預約已確認 ✨<br><br>
      📅 ${dateLabel}<br>
      🕐 ${selectedSlot}<br>
      💫 ${s.name}<br>
      💰 $${price.toLocaleString()}${isBirthday ? '（壽星 8 折）' : ''}<br><br>
    `;
    if (email) successHTML += `確認信將寄送至 ${email}<br><br>`;
    if (s.lineRequired) {
      successHTML += `⚠️ 請記得至 <a href="${CONFIG.LINE_URL}" target="_blank">LINE 官方帳號</a> 說明超渡內容<br><br>`;
    }
    successHTML += `
      <div style="background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:16px 18px;margin:16px 0;text-align:left;line-height:2;font-size:0.83rem;color:#e2c47a">
        我們會準時在線等候您。<br>
        請您提前 10 分鐘，找一個安靜的空間，<br>
        讓自己沉澱下來，帶著開放的心進入這段旅程。<br><br>
        時間會依照約定進行，若您延遲到來，<br>
        課程將依原定時間結束，敬請見諒。
      </div>
      <div style="font-size:0.78rem;color:#8a9e8a;margin-top:8px">
        如需取消請於前一日至 <a href="${CONFIG.LINE_URL}" target="_blank" style="color:#c9a84c">LINE 官方帳號</a> 告知
      </div>
    `;
    document.getElementById('successMsg').innerHTML = successHTML;

  } catch(e) {
    btn.disabled = false;
    btn.textContent = '確認送出預約 ✓';
    errBox.textContent = '送出失敗，請稍後再試或直接聯絡 LINE 官方帳號';
    errBox.style.display = 'block';
  }
}
