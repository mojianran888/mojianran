<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莫江然・意識空間｜預約系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0d2b20;color:#e8d8a8;min-height:100vh;padding-bottom:80px}
.header{background:rgba(10,40,28,0.9);border-bottom:1px solid rgba(201,162,39,0.3);padding:16px 20px}
.ht{font-size:1.2rem;font-weight:900;color:#e8c84a;letter-spacing:4px}
.hs{font-size:11px;color:rgba(232,216,168,0.5);letter-spacing:2px;margin-top:2px}
.bday-banner{margin:14px 16px 0;background:linear-gradient(135deg,#2a1f0a,#3a2a10);border:1.5px solid #c9a227;border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.toggle-sw{width:44px;height:24px;background:#333;border-radius:12px;position:relative;transition:background .3s;flex-shrink:0}
.toggle-sw::after{content:'';position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:3px;left:3px;transition:transform .3s}
.toggle-sw.on{background:#c9a227}
.toggle-sw.on::after{transform:translateX(20px)}
.nav-tabs{display:flex;margin:14px 16px 0;background:rgba(255,255,255,0.06);border-radius:12px;padding:4px;gap:4px}
.nav-tab{flex:1;padding:10px 4px;text-align:center;border-radius:8px;font-size:0.78rem;color:rgba(232,216,168,0.5);cursor:pointer;border:none;background:transparent}
.nav-tab.on{background:#c9a227;color:#1a0f00;font-weight:600}
.sec-title{font-size:0.72rem;color:rgba(232,216,168,0.5);letter-spacing:0.15em;padding:16px 16px 8px;text-transform:uppercase}
.svc-card{background:rgba(255,255,255,0.06);border:1px solid rgba(201,162,39,0.15);border-radius:12px;padding:16px;margin:0 16px 10px;cursor:pointer}
.svc-card.sel{border-color:#c9a227;background:rgba(36,51,32,0.8)}
.svc-name{font-size:1rem;font-weight:600;color:#e8d8a8}
.svc-price{font-size:1.05rem;font-weight:700;color:#c9a227;white-space:nowrap;margin-left:8px}
.svc-desc{font-size:0.75rem;color:rgba(232,216,168,0.55);margin-top:5px;line-height:1.6}
.tag{display:inline-block;font-size:0.65rem;background:rgba(201,168,76,0.12);color:#c9a227;border-radius:4px;padding:2px 7px;margin-top:6px;margin-right:4px}
.sticky{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:linear-gradient(to top,#0d2b20 70%,transparent);z-index:100}
.btn-main{width:100%;padding:16px;background:#c9a227;color:#1a0f00;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:0.05em}
.btn-main:disabled{background:#333;color:#555;cursor:not-allowed}
.btn-ghost{background:transparent;color:#c9a227;border:1px solid rgba(201,162,39,0.35);border-radius:10px;padding:8px 16px;font-size:0.82rem;cursor:pointer}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:0.78rem;color:rgba(232,216,168,0.5);cursor:pointer;padding:12px 16px;background:none;border:none}
.cal-wrap{padding:0 16px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 0 12px}
.month-lbl{font-size:1rem;color:#e8d8a8;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dh{text-align:center;font-size:0.68rem;color:rgba(232,216,168,0.4);padding:4px 0 8px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:0.82rem;cursor:pointer;background:rgba(255,255,255,0.04);color:#e8d8a8;border:1px solid transparent}
.cal-day.sel{background:#c9a227;color:#1a0f00;font-weight:700}
.cal-day.dis{color:#2a2a2a;cursor:not-allowed;background:transparent}
.cal-day.emp{background:transparent;cursor:default}
.cal-day.tod{border-color:rgba(201,162,39,0.4)}
.dot{width:5px;height:5px;border-radius:50%;margin-top:2px}
.slots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px}
.slot{padding:14px 8px;text-align:center;background:rgba(255,255,255,0.05);border:1px solid rgba(201,162,39,0.2);border-radius:12px;cursor:pointer}
.slot.sel{background:rgba(36,51,32,0.8);border-color:#c9a227}
.slot.locked{background:rgba(74,40,40,0.4);border-color:rgba(100,60,60,0.3);cursor:not-allowed}
.slot.restr{background:rgba(20,20,40,0.4);border-color:rgba(60,60,100,0.3);cursor:not-allowed}
.slot-t{font-size:0.9rem;font-weight:500;color:#e8d8a8}
.slot-s{font-size:0.65rem;color:rgba(232,216,168,0.5);margin-top:3px}
.slot.locked .slot-t,.slot.locked .slot-s{color:rgba(200,100,100,0.6)}
.slot.restr .slot-t,.slot.restr .slot-s{color:rgba(100,100,200,0.5)}
.cutoff{background:rgba(201,168,76,0.07);border:1px solid rgba(201,162,39,0.2);border-radius:8px;padding:10px 14px;font-size:0.75rem;color:#e8c84a;margin:0 16px 12px;line-height:1.6}
.form-wrap{padding:0 16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:0.75rem;color:rgba(232,216,168,0.6);margin-bottom:6px}
.field input,.field textarea{width:100%;padding:11px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(201,162,39,0.25);border-radius:10px;color:#e8d8a8;font-size:0.9rem;outline:none;font-family:sans-serif}
.field input:focus,.field textarea:focus{border-color:#c9a227}
.cancel-box{background:rgba(201,168,76,0.06);border-left:3px solid #c9a227;padding:12px 14px;margin:16px 0;border-radius:0 8px 8px 0;font-size:0.78rem;color:#e8c84a;line-height:1.8}
.sum-card{background:rgba(255,255,255,0.06);border:1px solid rgba(201,162,39,0.2);border-radius:12px;padding:16px;margin:0 16px 14px}
.sum-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.82rem}
.sum-row:last-child{border-bottom:none}
.sum-lbl{color:rgba(232,216,168,0.55)}
.sum-val{color:#e8d8a8}
.sum-total .sum-val{color:#c9a227;font-size:1rem;font-weight:700}
.success-wrap{text-align:center;padding:48px 24px 32px}
.success-line{width:80px;height:1px;background:linear-gradient(90deg,transparent,#c9a227,transparent);margin:20px auto}
.success-title{font-size:1.4rem;color:#c9a227;letter-spacing:0.1em;margin-bottom:6px}
.ritual{background:rgba(201,168,76,0.06);border:1px solid rgba(201,162,39,0.2);border-radius:12px;padding:16px 18px;margin:16px 0;text-align:left;line-height:2.1;font-size:0.83rem;color:#e8c84a}
.err-msg{color:#e88;font-size:0.8rem;padding:8px 16px;display:none}
.no-slots{text-align:center;padding:30px;color:rgba(232,216,168,0.5);font-size:0.85rem}
/* ADMIN */
.admin-wrap{padding:16px}
.admin-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.admin-tab{padding:8px 16px;border-radius:10px;border:1px solid rgba(201,162,39,0.25);background:transparent;color:#c9a227;font-size:0.8rem;cursor:pointer}
.admin-tab.on{background:#c9a227;color:#1a0f00;font-weight:700}
.admin-card{background:rgba(255,255,255,0.06);border:1px solid rgba(201,162,39,0.2);border-radius:12px;padding:14px;margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:0.75rem}
th{text-align:left;color:rgba(232,216,168,0.5);padding:8px;border-bottom:1px solid rgba(255,255,255,0.07);font-size:0.68rem}
td{color:#e8d8a8;padding:8px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:top}
.btn-red{background:transparent;border:1px solid rgba(240,112,112,0.3);color:#f07070;border-radius:6px;padding:4px 10px;font-size:0.72rem;cursor:pointer}
.btn-sm{background:transparent;border:1px solid rgba(201,162,39,0.3);color:#c9a227;border-radius:6px;padding:4px 10px;font-size:0.72rem;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <div class="ht">莫江然・意識空間</div>
  <div class="hs">看見因才能改命｜意識空間譯者</div>
</div>

<div class="bday-banner" id="bdayBanner" onclick="toggleBday()">
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:1.3rem">&#127874;</span>
    <div>
      <div style="font-size:0.88rem;color:#e8c84a;font-weight:500">本月壽星 8 折優惠</div>
      <div style="font-size:0.7rem;color:rgba(232,216,168,0.5);margin-top:2px">點選啟用，所有服務自動折扣</div>
    </div>
  </div>
  <div class="toggle-sw" id="bdayToggle"></div>
</div>

<div class="nav-tabs">
  <button class="nav-tab on" onclick="showMain('booking',this)">預約系統</button>
  <button class="nav-tab" onclick="window.open('https://lin.ee/pscg9XZ','_blank')">LINE 聯絡</button>
  <button class="nav-tab" onclick="showMain('admin',this)">後台管理</button>
</div>

<!-- BOOKING -->
<div id="mainBooking">
  <!-- STEP 1 -->
  <div id="s1">
    <div class="sec-title">選擇服務項目</div>
    <div id="svcList"></div>
    <div style="height:80px"></div>
    <div class="sticky"><button class="btn-main" id="btn12" disabled onclick="goTo(2)">選擇日期與時間 →</button></div>
  </div>
  <!-- STEP 2 -->
  <div id="s2" style="display:none">
    <button class="back-link" onclick="goTo(1)">← 返回服務選擇</button>
    <div class="sec-title">選擇預約日期</div>
    <div class="cal-wrap">
      <div class="cal-nav">
        <button class="btn-ghost" onclick="chMonth(-1)">&#8249;</button>
        <div class="month-lbl" id="mLabel"></div>
        <button class="btn-ghost" onclick="chMonth(1)">&#8250;</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div id="timeSection" style="display:none;margin-top:16px">
      <div class="sec-title">選擇時段</div>
      <div class="cutoff" id="cutoffNote" style="display:none"></div>
      <div class="slots-grid" id="slotsGrid"></div>
      <div class="no-slots" id="noSlots" style="display:none"></div>
    </div>
    <div style="height:80px"></div>
    <div class="sticky"><button class="btn-main" id="btn23" disabled onclick="goTo(3)">填寫資料 →</button></div>
  </div>
  <!-- STEP 3 -->
  <div id="s3" style="display:none">
    <button class="back-link" onclick="goTo(2)">← 返回選擇時段</button>
    <div class="sec-title">確認預約資訊</div>
    <div class="sum-card" id="sumCard"></div>
    <div class="sec-title">填寫資料</div>
    <div class="form-wrap">
      <div class="field"><label>姓名 *</label><input id="iName" placeholder="請輸入您的姓名"></div>
      <div class="field"><label>電話 *</label><input id="iPhone" type="tel" placeholder="請輸入聯絡電話"></div>
      <div class="field"><label>電子信箱（選填）</label><input id="iEmail" type="email" placeholder="yourname@gmail.com"></div>
      <div class="field"><label>備註（選填）</label><textarea id="iNote" rows="3" placeholder="如有特殊需求…"></textarea></div>
      <div class="cancel-box">&#9888;&#65039; 取消預約請於前一日至官方帳號告知<br><a href="https://lin.ee/pscg9XZ" target="_blank" style="color:#c9a227">LINE 官方帳號：點此聯絡</a></div>
    </div>
    <div class="err-msg" id="errMsg"></div>
    <div style="height:80px"></div>
    <div class="sticky"><button class="btn-main" onclick="submitBooking()">確認送出預約 ✓</button></div>
  </div>
  <!-- STEP 4 -->
  <div id="s4" style="display:none">
    <div class="success-wrap">
      <div class="success-line"></div>
      <div class="success-title">預約成功</div>
      <div class="success-line"></div>
      <div id="successMsg" style="font-size:0.85rem;color:rgba(232,216,168,0.85);line-height:1.9;margin-top:16px"></div>
      <div style="margin-top:28px">
        <button onclick="location.reload()" style="background:none;border:1px solid rgba(201,162,39,0.4);color:#c9a227;border-radius:10px;padding:12px 28px;font-size:0.85rem;cursor:pointer">← 返回首頁</button>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="mainAdmin" style="display:none">
  <div class="admin-wrap">
    <div id="aLogin">
      <div class="admin-card">
        <div style="font-size:1rem;color:#e8c84a;margin-bottom:14px;font-weight:600">&#128274; 後台管理</div>
        <div class="field"><label>管理員密碼</label><input type="password" id="aPwd" placeholder="請輸入密碼"></div>
        <button class="btn-main" onclick="doLogin()" style="margin-top:8px">登入</button>
        <div id="aErr" style="color:#e88;font-size:0.8rem;margin-top:8px;display:none">密碼錯誤</div>
      </div>
    </div>
    <div id="aPanel" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="color:#e8c84a;font-weight:600">&#9881;&#65039; 後台管理</div>
        <button class="btn-sm" onclick="doLogout()">登出</button>
      </div>
      <div class="admin-tabs">
        <button class="admin-tab on" onclick="showATab('bookings',this)">&#128203; 預約紀錄</button>
        <button class="admin-tab" onclick="showATab('services',this)">&#128188; 服務管理</button>
        <button class="admin-tab" onclick="showATab('notices',this)">&#9993;&#65039; 注意事項</button>
      </div>
      <div id="aBookings"></div>
      <div id="aServices" style="display:none"></div>
      <div id="aNotices" style="display:none"></div>
    </div>
  </div>
</div>

<script>
// ---- CONFIG ----
var MAKE_WEBHOOK = 'https://hook.eu2.make.com/buq9jsnn73y2cgffexx1ay2sd9sn801z';
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwx97t_82w6ALhK-MgbmJx9zwpNo_lLrRmU6umof8wEgqfUE9zv_rtbgiUYbbf25JPC/exec';
var LINE_URL = 'https://lin.ee/pscg9XZ';
var ADMIN_PW = 'Mo8899';
var EMAILJS_SVC = 'service_5ylrv7f';
var EMAILJS_TPL = 'template_wqugwja';
var EMAILJS_KEY = 'RliHSmYpPbKAfoVFn';

// ---- DEFAULT SERVICES ----
var DEFAULT_SVCS = [
  {id:'yuanchen', name:'全台首創重建元辰宮', desc:'客製化心靈建構｜讓你完全翻轉人生，重建生命藍圖｜過程大約 2～2.5 小時', price:8800, duration:3, tags:['線上/現場'], active:true},
  {id:'deep',     name:'元辰宮深化教準',     desc:'30 分鐘｜現場 or 線上｜須觀過第一次元辰宮', price:1500, duration:1, tags:['線上/現場'], active:true},
  {id:'wealth',   name:'財富能量調整',        desc:'每月財富調頻，每月農曆 30 日前報名，初一啟動，每月可報名一次', price:1111, birthdayPrice:888, duration:1, tags:['線上'], active:true},
  {id:'consult',  name:'線上諮詢服務',        desc:'15 分鐘｜線上', price:600, duration:1, tags:['線上'], active:true},
  {id:'energy',   name:'諮詢能量調頻',        desc:'40 分鐘｜線上 or 現場', price:1800, duration:1, tags:['線上/現場'], active:true},
  {id:'ancestor', name:'超渡祖先 亡靈',       desc:'每位計費｜預約後請至官方帳號說明超渡內容', price:8600, duration:1, tags:['線上'], lineRequired:true, active:true},
  {id:'baby',     name:'超渡嬰靈',            desc:'每位計費｜預約後請至官方帳號說明超渡內容', price:2000, duration:1, tags:['線上'], lineRequired:true, active:true},
  {id:'surgery',  name:'現場手術台連線',       desc:'小產手術現場聯線｜線上', price:3600, duration:1, tags:['線上'], active:true}
];

var MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
var WDAYS = ['日','一','二','三','四','五','六'];

// ---- STATE ----
var isBday = false;
var services = loadSvcs();
var notices = localStorage.getItem('mjr:notices') || '';
var bookedSlots = {};
var selSvc = null, selDate = null, selSlot = null;
var calY = new Date().getFullYear();
var calM = new Date().getMonth();

function loadSvcs() {
  try {
    var saved = JSON.parse(localStorage.getItem('mjr:services'));
    if (saved && saved.length > 0) return saved;
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_SVCS));
}

// ---- FETCH BOOKED ----
function fetchBooked() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', GAS_URL + '?action=getBooked', true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      try { bookedSlots = JSON.parse(xhr.responseText); } catch(e) { bookedSlots = {}; }
    }
  };
  xhr.send();
}
fetchBooked();

// Load EmailJS
var ejsScript = document.createElement('script');
ejsScript.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
ejsScript.onload = function() { emailjs.init(EMAILJS_KEY); };
document.head.appendChild(ejsScript);

// ---- BIRTHDAY ----
function toggleBday() {
  isBday = !isBday;
  document.getElementById('bdayToggle').className = isBday ? 'toggle-sw on' : 'toggle-sw';
  renderSvcs();
}

// ---- NAV ----
function showMain(tab, btn) {
  document.getElementById('mainBooking').style.display = tab === 'booking' ? 'block' : 'none';
  document.getElementById('mainAdmin').style.display = tab === 'admin' ? 'block' : 'none';
  var tabs = document.querySelectorAll('.nav-tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].className = 'nav-tab';
  if (btn) btn.className = 'nav-tab on';
  if (tab === 'admin') initAdmin();
}

function goTo(n) {
  for (var i = 1; i <= 4; i++) document.getElementById('s'+i).style.display = 'none';
  document.getElementById('s'+n).style.display = 'block';
  window.scrollTo(0,0);
  if (n === 2) { renderCal(); selSlot = null; document.getElementById('btn23').disabled = true; document.getElementById('timeSection').style.display = 'none'; }
  if (n === 3) renderSum();
}

// ---- SERVICES ----
function getPrice(s) {
  if (!isBday) return s.price;
  if (s.birthdayPrice) return s.birthdayPrice;
  return Math.round(s.price * 0.8);
}

function renderSvcs() {
  var el = document.getElementById('svcList');
  el.innerHTML = '';
  for (var i = 0; i < services.length; i++) {
    var s = services[i];
    if (!s.active) continue;
    var p = getPrice(s);
    var div = document.createElement('div');
    div.className = (selSvc && selSvc.id === s.id) ? 'svc-card sel' : 'svc-card';
    var origHtml = isBday ? '<div style="font-size:0.7rem;color:rgba(232,216,168,0.4);text-decoration:line-through">$' + s.price.toLocaleString() + '</div>' : '';
    var tagsHtml = '';
    for (var j = 0; j < s.tags.length; j++) tagsHtml += '<span class="tag">' + s.tags[j] + '</span>';
    if (s.lineRequired) tagsHtml += '<span class="tag" style="background:rgba(0,195,0,0.1);color:#4caf50">&#128242; 預約後請至官方帳號說明超渡內容</span>';
    div.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:flex-start"><div class="svc-name">' + s.name + '</div><div style="text-align:right;margin-left:8px;flex-shrink:0">' + origHtml + '<div class="svc-price">$' + p.toLocaleString() + '</div></div></div><div class="svc-desc">' + s.desc + '</div><div style="margin-top:6px">' + tagsHtml + '</div>';
    (function(svc) {
      div.onclick = function() {
        selSvc = svc;
        renderSvcs();
        document.getElementById('btn12').disabled = false;
      };
    })(s);
    el.appendChild(div);
  }
}
renderSvcs();

// ---- CALENDAR ----
function chMonth(d) {
  calM += d;
  if (calM < 0) { calM = 11; calY--; }
  if (calM > 11) { calM = 0; calY++; }
  renderCal();
}

function fmtDate(dt) {
  return dt.getFullYear() + '-' + pad(dt.getMonth()+1) + '-' + pad(dt.getDate());
}
function pad(n) { return n < 10 ? '0'+n : ''+n; }

function renderCal() {
  document.getElementById('mLabel').textContent = calY + ' 年 ' + MONTHS[calM];
  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  for (var i = 0; i < WDAYS.length; i++) {
    var dh = document.createElement('div');
    dh.className = 'cal-dh';
    dh.textContent = WDAYS[i];
    grid.appendChild(dh);
  }
  var first = new Date(calY, calM, 1).getDay();
  var days = new Date(calY, calM+1, 0).getDate();
  var today = new Date(); today.setHours(0,0,0,0);
  for (var e = 0; e < first; e++) {
    var emp = document.createElement('div');
    emp.className = 'cal-day emp';
    grid.appendChild(emp);
  }
  for (var d = 1; d <= days; d++) {
    var dt = new Date(calY, calM, d);
    var dow = dt.getDay();
    var ds = fmtDate(dt);
    var el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;
    var isPast = dt < today;
    var isSun = dow === 0;
    if (isPast || isSun) {
      el.className = 'cal-day dis';
    } else {
      if (dt.toDateString() === today.toDateString()) el.className += ' tod';
      if (selDate === ds) el.className = 'cal-day sel';
      (function(dateStr) {
        el.onclick = function() {
          selDate = dateStr;
          selSlot = null;
          document.getElementById('btn23').disabled = true;
          renderCal();
          renderSlots();
          document.getElementById('timeSection').style.display = 'block';
        };
      })(ds);
    }
    grid.appendChild(el);
  }
}

// ---- SLOTS ----
function isRestr(ds, h) {
  var today = new Date(); today.setHours(0,0,0,0);
  var sd = new Date(ds); sd.setHours(0,0,0,0);
  var diff = Math.round((sd - today) / 86400000);
  var nowH = new Date().getHours();
  if (diff > 1) return false;
  if (diff === 0) { return nowH < 12 ? h < 16 : true; }
  if (diff === 1) {
    if (nowH >= 12 && nowH < 16) return h >= 12;
    if (nowH >= 16) return h < 12 || h >= 16;
    return false;
  }
  return false;
}

function isBooked(ds, h, dur) {
  var booked = bookedSlots[ds] || [];
  for (var i = 0; i < dur; i++) {
    var bh = h + i;
    var ts = pad(bh) + ':00';
    for (var j = 0; j < booked.length; j++) {
      if (booked[j] === ts) return true;
    }
  }
  return false;
}

function getSession(h) { return h < 12 ? '早上' : h < 16 ? '中午' : '晚上'; }

function renderSlots() {
  var grid = document.getElementById('slotsGrid');
  var noMsg = document.getElementById('noSlots');
  var note = document.getElementById('cutoffNote');
  grid.innerHTML = '';
  noMsg.style.display = 'none';
  note.style.display = 'none';
  if (!selDate || !selSvc) return;
  var dow = new Date(selDate).getDay();
  var isSat = dow === 6;
  var maxH = isSat ? 14 : 18;
  var dur = selSvc.duration || 1;
  var today = new Date(); today.setHours(0,0,0,0);
  var sd = new Date(selDate); sd.setHours(0,0,0,0);
  var diff = Math.round((sd - today) / 86400000);
  var nowH = new Date().getHours();
  if (diff <= 1) {
    var msg = '';
    if (diff === 0 && nowH < 12) msg = '&#9200;&#65039; 今日限預約晚上時段（16:00 以後）';
    else if (diff === 1 && nowH >= 12 && nowH < 16) msg = '&#9200;&#65039; 明日限預約早上時段（10:00–11:00）';
    else if (diff === 1 && nowH >= 16) msg = '&#9200;&#65039; 明日限預約中午時段（12:00–15:00）';
    if (msg) { note.innerHTML = msg; note.style.display = 'block'; }
  }
  var hasAny = false;
  for (var h = 10; h <= maxH; h++) {
    var ts = pad(h) + ':00';
    var restr = isRestr(selDate, h);
    var locked = isBooked(selDate, h, dur);
    var el = document.createElement('div');
    el.className = 'slot' + (locked ? ' locked' : restr ? ' restr' : '');
    if (selSlot === ts && !locked && !restr) el.className += ' sel';
    var saText = locked ? '已預約' : restr ? '不可預約' : getSession(h);
    el.innerHTML = '<div class="slot-t">' + ts + '</div><div class="slot-s">' + saText + '</div>';
    if (!locked && !restr) {
      hasAny = true;
      (function(t, elem) {
        elem.onclick = function() {
          selSlot = t;
          renderSlots();
          document.getElementById('btn23').disabled = false;
        };
      })(ts, el);
    }
    grid.appendChild(el);
  }
  if (!hasAny) { noMsg.style.display = 'block'; noMsg.textContent = '此日期無可用時段，請選擇其他日期'; }
}

// ---- SUMMARY ----
function renderSum() {
  var s = selSvc, p = getPrice(s);
  var dl = new Date(selDate).toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  var bdayRow = isBday ? '<div class="sum-row"><span class="sum-lbl">優惠</span><span class="sum-val" style="color:#c9a227">&#127874; 本月壽星 8 折</span></div>' : '';
  document.getElementById('sumCard').innerHTML = '<div class="sum-row"><span class="sum-lbl">服務</span><span class="sum-val">' + s.name + '</span></div><div class="sum-row"><span class="sum-lbl">日期</span><span class="sum-val">' + dl + '</span></div><div class="sum-row"><span class="sum-lbl">時段</span><span class="sum-val">' + selSlot + '</span></div>' + bdayRow + '<div class="sum-row sum-total"><span class="sum-lbl">費用</span><span class="sum-val">$' + p.toLocaleString() + '</span></div>';
}

// ---- SUBMIT ----
function submitBooking() {
  var name = document.getElementById('iName').value.replace(/^\s+|\s+$/g,'');
  var phone = document.getElementById('iPhone').value.replace(/^\s+|\s+$/g,'');
  var email = document.getElementById('iEmail').value.replace(/^\s+|\s+$/g,'');
  var note = document.getElementById('iNote').value.replace(/^\s+|\s+$/g,'');
  var errEl = document.getElementById('errMsg');
  if (!name || !phone) { errEl.textContent = '&#9888;&#65039; 姓名和電話為必填欄位'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  var s = selSvc, p = getPrice(s);
  var payload = {event:'new_booking', booking_id:'BK'+Date.now(), name:name, phone:phone, email:email, service:s.name, price:p, date:selDate, slot:selSlot, dateSlot:selDate+' '+selSlot, note:note, created_at:new Date().toISOString()};
  var xhr = new XMLHttpRequest();
  xhr.open('POST', MAKE_WEBHOOK, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.send(JSON.stringify(payload));
  if (email && typeof emailjs !== 'undefined') {
    var dl = new Date(selDate).toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
    emailjs.send(EMAILJS_SVC, EMAILJS_TPL, {to_name:name, to_email:email, service_name:s.name, booking_date:dl, booking_time:selSlot, booking_price:'$'+p.toLocaleString(), line_url:LINE_URL});
  }
  if (!bookedSlots[selDate]) bookedSlots[selDate] = [];
  for (var i = 0; i < s.duration; i++) bookedSlots[selDate].push(pad(parseInt(selSlot)+i)+':00');
  var dl2 = new Date(selDate).toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  var lineReq = s.lineRequired ? '<br>&#9888;&#65039; 請至 <a href="'+LINE_URL+'" target="_blank" style="color:#c9a227">LINE 官方帳號</a> 說明超渡內容' : '';
  var emailLine = email ? '<br>確認信已寄至 ' + email : '';
  document.getElementById('successMsg').innerHTML = '<b>'+name+'</b> 您好，您的預約已確認 &#10024;<br><br>&#128197; '+dl2+'<br>&#128336; '+selSlot+'<br>&#128171; '+s.name+'<br>&#128176; $'+p.toLocaleString()+(isBday?'（壽星 8 折）':'')+'<br>'+emailLine+lineReq+'<div class="ritual">我們會準時在線等候您。<br>請您提前 10 分鐘，找一個安靜的空間，<br>讓自己沉澱下來，帶著開放的心進入這段旅程。<br><br>時間會依照約定進行，若您延遲到來，<br>課程將依原定時間結束，敬請見諒。</div><div style="font-size:0.75rem;color:rgba(232,216,168,0.5)">如需取消請於前一日至 <a href="'+LINE_URL+'" target="_blank" style="color:#c9a227">LINE 官方帳號</a> 告知</div>';
  goTo(4);
}

// ---- ADMIN ----
function initAdmin() {
  var saved = localStorage.getItem('mjr:adminAuth');
  if (saved === '1') { showPanel(); }
}

function doLogin() {
  if (document.getElementById('aPwd').value === ADMIN_PW) {
    localStorage.setItem('mjr:adminAuth','1');
    showPanel();
  } else {
    document.getElementById('aErr').style.display = 'block';
  }
}

function doLogout() {
  localStorage.removeItem('mjr:adminAuth');
  document.getElementById('aLogin').style.display = 'block';
  document.getElementById('aPanel').style.display = 'none';
  document.getElementById('aPwd').value = '';
}

function showPanel() {
  document.getElementById('aLogin').style.display = 'none';
  document.getElementById('aPanel').style.display = 'block';
  loadBookings();
}

function showATab(tab, btn) {
  document.getElementById('aBookings').style.display = 'none';
  document.getElementById('aServices').style.display = 'none';
  document.getElementById('aNotices').style.display = 'none';
  document.getElementById('a'+tab.charAt(0).toUpperCase()+tab.slice(1)).style.display = 'block';
  var tabs = document.querySelectorAll('.admin-tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].className = 'admin-tab';
  btn.className = 'admin-tab on';
  if (tab === 'bookings') loadBookings();
  if (tab === 'services') renderAdminSvcs();
  if (tab === 'notices') renderAdminNotices();
}

function loadBookings() {
  var el = document.getElementById('aBookings');
  el.innerHTML = '<div style="padding:20px;color:rgba(232,216,168,0.5)">載入中…</div>';
  var xhr = new XMLHttpRequest();
  xhr.open('GET', GAS_URL + '?action=getAll', true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status !== 200) { el.innerHTML = '<div style="padding:20px;color:#e88">載入失敗</div>'; return; }
    try {
      var data = JSON.parse(xhr.responseText);
      var rows = data.bookings || [];
      var valid = [];
      for (var i = 0; i < rows.length; i++) { if (rows[i][0]) valid.push(rows[i]); }
      if (!valid.length) { el.innerHTML = '<div style="padding:20px;color:rgba(232,216,168,0.5)">尚無預約</div>'; return; }
      var html = '<div style="overflow-x:auto"><table><thead><tr><th>日期</th><th>時段</th><th>姓名</th><th>電話</th><th>服務</th><th>金額</th></tr></thead><tbody>';
      for (var j = valid.length-1; j >= 0; j--) {
        var r = valid[j];
        html += '<tr><td>' + (r[5]||'') + '</td><td>' + (r[6]||'') + '</td><td>' + (r[0]||'') + '</td><td>' + (r[2]||'') + '</td><td>' + (r[3]||'') + '</td><td>$' + Number(r[4]).toLocaleString() + '</td></tr>';
      }
      html += '</tbody></table></div>';
      el.innerHTML = html;
    } catch(e) { el.innerHTML = '<div style="padding:20px;color:#e88">解析失敗</div>'; }
  };
  xhr.send();
}

function renderAdminSvcs() {
  var el = document.getElementById('aServices');
  el.innerHTML = '';
  for (var i = 0; i < services.length; i++) {
    var s = services[i];
    var card = document.createElement('div');
    card.className = 'admin-card';
    card.style.opacity = s.active ? '1' : '0.5';
    card.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap"><div style="flex:1"><div style="font-weight:600;margin-bottom:4px" id="sname'+i+'">' + s.name + '</div><div style="font-size:0.75rem;color:rgba(232,216,168,0.5);margin-bottom:4px" id="sdesc'+i+'">' + s.desc + '</div><div style="color:#c9a227;font-weight:700" id="sprice'+i+'">$' + s.price.toLocaleString() + '</div></div><div style="display:flex;gap:6px;flex-shrink:0"><button class="btn-sm" onclick="editSvc('+i+')">編輯</button><button class="btn-sm" onclick="toggleSvc('+i+')">' + (s.active?'隱藏':'顯示') + '</button></div></div><div id="sedit'+i+'" style="display:none;margin-top:12px"><div style="margin-bottom:8px"><label style="font-size:0.72rem;color:rgba(232,216,168,0.5)">服務名稱</label><input id="einame'+i+'" value="' + s.name + '" style="width:100%;padding:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(201,162,39,0.25);border-radius:8px;color:#e8d8a8;margin-top:4px"></div><div style="margin-bottom:8px"><label style="font-size:0.72rem;color:rgba(232,216,168,0.5)">說明</label><textarea id="eidesc'+i+'" rows="2" style="width:100%;padding:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(201,162,39,0.25);border-radius:8px;color:#e8d8a8;margin-top:4px;font-family:sans-serif">' + s.desc + '</textarea></div><div style="margin-bottom:8px"><label style="font-size:0.72rem;color:rgba(232,216,168,0.5)">價格</label><input id="eiprice'+i+'" type="number" value="' + s.price + '" style="width:100%;padding:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(201,162,39,0.25);border-radius:8px;color:#e8d8a8;margin-top:4px"></div><div style="display:flex;gap:8px"><button class="btn-sm" onclick="saveSvc('+i+')">儲存</button><button class="btn-sm" onclick="cancelEdit('+i+')">取消</button></div></div>';
    el.appendChild(card);
  }
}

function editSvc(i) { document.getElementById('sedit'+i).style.display = 'block'; }
function cancelEdit(i) { document.getElementById('sedit'+i).style.display = 'none'; }

function saveSvc(i) {
  services[i].name = document.getElementById('einame'+i).value;
  services[i].desc = document.getElementById('eidesc'+i).value;
  services[i].price = parseInt(document.getElementById('eiprice'+i).value) || services[i].price;
  localStorage.setItem('mjr:services', JSON.stringify(services));
  renderSvcs();
  renderAdminSvcs();
}

function toggleSvc(i) {
  services[i].active = !services[i].active;
  localStorage.setItem('mjr:services', JSON.stringify(services));
  renderSvcs();
  renderAdminSvcs();
}

function renderAdminNotices() {
  var el = document.getElementById('aNotices');
  el.innerHTML = '<div class="admin-card"><div style="font-size:0.85rem;color:#e8c84a;margin-bottom:10px">&#128203; 注意事項</div><textarea id="noticeText" rows="8" style="width:100%;padding:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(201,162,39,0.25);border-radius:8px;color:#e8d8a8;font-family:sans-serif;margin-bottom:10px" placeholder="每行一條注意事項">' + notices + '</textarea><button class="btn-main" onclick="saveNotices()">儲存</button><div id="noticeSaved" style="color:#5dd68c;font-size:0.8rem;margin-top:8px;display:none">&#10003; 已儲存</div></div>';
}

function saveNotices() {
  notices = document.getElementById('noticeText').value;
  localStorage.setItem('mjr:notices', notices);
  var el = document.getElementById('noticeSaved');
  el.style.display = 'block';
  setTimeout(function(){ el.style.display = 'none'; }, 2000);
}
</script>
