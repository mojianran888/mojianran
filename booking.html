<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莫江然・意識空間｜預約系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a227;--gold-light:#e8c84a;--gold-dark:#8a6e18;
  --bg:#0d2b20;--card:rgba(255,255,255,0.06);--card2:rgba(255,255,255,0.1);
  --text:#e8d8a8;--text2:rgba(232,216,168,0.85);--text3:rgba(232,216,168,0.6);
  --green:#5dd68c;--red:#f07070;--line:#00C300;
  --r:12px;--rl:18px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{min-height:100vh;background:radial-gradient(ellipse at 20% 0%,#1a4a32 0%,transparent 55%),radial-gradient(ellipse at 80% 100%,#153d28 0%,transparent 55%),var(--bg)}
/* HEADER */
.header{background:rgba(10,40,28,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,162,39,0.3);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
.ht{font-family:'Noto Serif TC',serif;font-size:1.2rem;font-weight:900;color:var(--gold-light);letter-spacing:4px}
.hs{font-size:11px;color:var(--text3);letter-spacing:2px;margin-top:2px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--r);font-family:'Noto Serif TC',serif;cursor:pointer;transition:all .2s;letter-spacing:1px;font-size:14px;padding:10px 20px;font-weight:600}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light),var(--gold-dark));color:#1a0f00}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,162,39,0.35)}
.btn-gold:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{background:transparent;color:var(--gold);border:1px solid rgba(201,162,39,0.35)}
.btn-ghost:hover{background:rgba(201,162,39,0.1)}
.btn-ghost:disabled{opacity:.3;cursor:not-allowed}
.btn-sm{padding:7px 14px;font-size:12px}
.btn-tab{background:transparent;color:var(--gold);border:1px solid rgba(201,162,39,0.25);border-radius:10px;padding:8px 16px;font-family:'Noto Serif TC',serif;font-size:13px;cursor:pointer;transition:all .2s;font-weight:500}
.btn-tab.on{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#1a0f00;border-color:transparent;font-weight:700}
/* CARD */
.card{background:var(--card);border:1px solid rgba(201,162,39,0.2);border-radius:var(--rl);padding:18px;transition:border .2s}
.card-hi{background:rgba(201,162,39,0.07);border-color:rgba(201,162,39,0.3)}
/* FORM */
input,select,textarea{background:rgba(255,255,255,0.05);border:1px solid rgba(201,162,39,0.25);border-radius:10px;color:var(--text);padding:11px 14px;font-family:'Noto Sans TC',sans-serif;font-size:14px;width:100%;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:#0d2015;color:var(--text)}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:6px}
/* BIRTHDAY */
.bday-banner{margin:14px 16px 0;background:linear-gradient(135deg,#2a1f0a,#3a2a10);border:1.5px solid var(--gold);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.toggle-sw{width:44px;height:24px;background:#333;border-radius:12px;position:relative;transition:background .3s;flex-shrink:0}
.toggle-sw::after{content:'';position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:3px;left:3px;transition:transform .3s}
.toggle-sw.on{background:var(--gold)}
.toggle-sw.on::after{transform:translateX(20px)}
/* NAV */
.nav-tabs{display:flex;margin:14px 16px 0;background:rgba(255,255,255,0.06);border-radius:var(--r);padding:4px;gap:4px}
.nav-tab{flex:1;padding:10px 8px;text-align:center;border-radius:8px;font-size:0.8rem;color:var(--text3);cursor:pointer;transition:all .2s;border:none;background:transparent;font-family:'Noto Sans TC',sans-serif}
.nav-tab.on{background:var(--gold);color:#1a0f00;font-weight:600}
/* SECTION */
.sec-title{font-size:0.75rem;color:var(--text3);letter-spacing:0.15em;padding:18px 16px 8px;text-transform:uppercase}
/* SERVICE CARDS */
.svc-card{background:var(--card);border:1px solid rgba(201,162,39,0.15);border-radius:var(--r);padding:16px;margin:0 16px 10px;cursor:pointer;transition:border-color .2s,background .2s}
.svc-card:hover{border-color:rgba(201,162,39,0.4)}
.svc-card.sel{border-color:var(--gold);background:rgba(36,51,32,0.8)}
.svc-name{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:600;color:var(--text)}
.svc-price{font-size:1.05rem;font-weight:700;color:var(--gold);white-space:nowrap;margin-left:12px}
.svc-desc{font-size:0.78rem;color:var(--text3);margin-top:5px;line-height:1.6}
.tag{display:inline-block;font-size:0.68rem;background:rgba(201,168,76,0.12);color:var(--gold);border-radius:4px;padding:2px 7px;margin-top:6px;margin-right:4px}
/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px 12px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 16px}
.cal-dh{text-align:center;font-size:11px;color:var(--text3);padding:4px 0 8px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:0.82rem;cursor:pointer;background:rgba(255,255,255,0.04);color:var(--text);border:1px solid transparent;transition:all .15s}
.cal-day:hover:not(.dis):not(.emp){border-color:var(--gold)}
.cal-day.sel{background:var(--gold);color:#1a0f00;font-weight:700}
.cal-day.dis{color:#333;cursor:not-allowed;background:transparent}
.cal-day.emp{background:transparent;cursor:default}
.cal-day.tod:not(.sel){border-color:rgba(201,162,39,0.4)}
.dot{width:5px;height:5px;border-radius:50%;margin-top:2px}
/* SLOTS */
.slots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px}
.slot{padding:14px 8px;text-align:center;background:var(--card);border:1px solid rgba(201,162,39,0.2);border-radius:var(--r);cursor:pointer;transition:all .15s}
.slot:hover:not(.locked):not(.restr){border-color:var(--gold)}
.slot.sel{background:rgba(36,51,32,0.8);border-color:var(--gold)}
.slot.locked{background:rgba(74,58,58,0.5);border-color:rgba(100,60,60,0.3);cursor:not-allowed}
.slot.locked .st{color:#7a5a5a}
.slot.restr{background:rgba(20,20,40,0.5);border-color:rgba(80,80,120,0.3);cursor:not-allowed}
.slot.restr .st{color:#444466}
.st{font-size:0.9rem;font-weight:500;color:var(--text)}
.sa{font-size:0.65rem;color:var(--text3);margin-top:3px}
/* FORM FIELDS */
.form-wrap{padding:0 16px}
.field{margin-bottom:14px}
/* CANCEL NOTICE */
.cancel-box{background:rgba(201,168,76,0.06);border-left:3px solid var(--gold);padding:12px 14px;margin:16px 0;border-radius:0 8px 8px 0}
.cancel-box p{font-size:0.78rem;color:var(--gold-light);line-height:1.8}
/* SUMMARY */
.summary{background:var(--card);border:1px solid rgba(201,162,39,0.2);border-radius:var(--r);padding:16px;margin:0 16px 14px}
.sum-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.82rem}
.sum-row:last-child{border-bottom:none}
.sum-label{color:var(--text3)}
.sum-val{color:var(--text)}
.sum-row.total .sum-val{color:var(--gold);font-size:1rem;font-weight:700}
/* SUCCESS */
.success-wrap{text-align:center;padding:48px 24px 32px}
.success-divider{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:20px auto}
.success-title{font-family:'Noto Serif TC',serif;font-size:1.4rem;color:var(--gold);letter-spacing:0.1em;margin-bottom:6px}
.ritual-box{background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:16px 18px;margin:16px 0;text-align:left;line-height:2.1;font-size:0.83rem;color:var(--gold-light)}
/* STICKY BTN */
.sticky{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:linear-gradient(to top,var(--bg) 60%,transparent);z-index:100}
.btn-main{width:100%;padding:16px;background:var(--gold);color:#1a0f00;border:none;border-radius:var(--r);font-size:1rem;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;letter-spacing:0.05em;transition:background .2s}
.btn-main:hover{background:var(--gold-light)}
.btn-main:disabled{background:#444;color:#666;cursor:not-allowed}
/* BACK */
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--text3);cursor:pointer;padding:12px 16px}
.back-link:hover{color:var(--gold)}
/* CUTOFF NOTE */
.cutoff-note{background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.2);border-radius:8px;padding:10px 14px;font-size:0.75rem;color:var(--gold-light);margin:0 16px 12px;line-height:1.6}
/* ADMIN */
.admin-wrap{padding:16px}
.admin-login{background:var(--card);border-radius:var(--rl);padding:24px;margin-top:8px}
.admin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid rgba(201,162,39,0.2);border-radius:var(--r);padding:14px;text-align:center}
.stat-val{font-size:1.3rem;font-weight:700;color:var(--gold-light);font-family:'Noto Serif TC',serif}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px}
.admin-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.admin-table{width:100%;border-collapse:collapse;font-size:0.78rem}
.admin-table th{text-align:left;color:var(--text3);padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.08);font-size:0.7rem;letter-spacing:0.08em}
.admin-table td{color:var(--text);padding:10px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:top}
/* SPINNER */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(201,162,39,0.3);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-right:6px;vertical-align:middle}
/* MSG */
.msg{padding:10px 14px;border-radius:8px;font-size:0.8rem;margin:0 16px 10px;display:none}
.msg.err{background:rgba(200,60,60,0.12);border:1px solid rgba(200,60,60,0.3);color:#e88;display:block}
/* VIEWS */
.view{display:none}.view.on{display:block}
.step-view{display:none}.step-view.on{display:block}
/* NO SLOTS */
.no-slots{text-align:center;padding:30px 20px;color:var(--text3);font-size:0.85rem;line-height:1.8}
/* LINE TAG */
.line-tag{background:rgba(0,195,0,0.12);color:#4caf50;border-radius:4px;font-size:0.68rem;padding:2px 7px;margin-top:6px;display:inline-block}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="header">
  <div>
    <div class="ht">莫江然・意識空間</div>
    <div class="hs">看見因才能改命｜意識空間譯者</div>
  </div>
</div>

<!-- BIRTHDAY -->
<div class="bday-banner" id="bdayBanner" onclick="toggleBday()">
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:1.3rem">🎂</span>
    <div>
      <div style="font-size:0.88rem;color:var(--gold-light);font-weight:500">本月壽星 8 折優惠</div>
      <div style="font-size:0.7rem;color:var(--text3);margin-top:2px">點選啟用，所有服務自動折扣</div>
    </div>
  </div>
  <div class="toggle-sw" id="bdayToggle"></div>
</div>

<!-- NAV -->
<div class="nav-tabs">
  <button class="nav-tab on" onclick="showView('booking',this)">預約系統</button>
  <button class="nav-tab" onclick="window.open('https://lin.ee/pscg9XZ','_blank')">LINE 聯絡</button>
  <button class="nav-tab" onclick="showView('admin',this)">後台管理</button>
</div>

<!-- ══ BOOKING VIEW ══ -->
<div class="view on" id="view-booking">

  <!-- STEP 1: SERVICE -->
  <div class="step-view on" id="step1">
    <div class="sec-title">選擇服務項目</div>
    <div id="svcList"></div>
    <div style="height:80px"></div>
    <div class="sticky">
      <button class="btn-main" id="toStep2" onclick="goStep(2)" disabled>選擇日期與時間 →</button>
    </div>
  </div>

  <!-- STEP 2: DATE + TIME -->
  <div class="step-view" id="step2">
    <div class="back-link" onclick="goStep(1)">← 返回服務選擇</div>
    <div class="sec-title">選擇預約日期</div>
    <div style="padding:0 16px">
      <div class="cal-nav">
        <button class="btn btn-ghost btn-sm" onclick="changeMonth(-1)">‹</button>
        <div id="monthLabel" style="font-family:'Noto Serif TC',serif;font-size:1rem;color:var(--text)"></div>
        <button class="btn btn-ghost btn-sm" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="cal-grid" id="calGrid"></div>

    <div id="timeSection" style="display:none;margin-top:16px">
      <div class="sec-title">選擇時段</div>
      <div class="cutoff-note" id="cutoffNote" style="display:none"></div>
      <div class="slots-grid" id="slotsGrid"></div>
      <div class="no-slots" id="noSlots" style="display:none"></div>
    </div>

    <div style="height:80px"></div>
    <div class="sticky">
      <button class="btn-main" id="toStep3" onclick="goStep(3)" disabled>填寫資料 →</button>
    </div>
  </div>

  <!-- STEP 3: FORM -->
  <div class="step-view" id="step3">
    <div class="back-link" onclick="goStep(2)">← 返回選擇時段</div>
    <div class="sec-title">確認預約資訊</div>
    <div class="summary" id="summaryBox"></div>
    <div class="sec-title">填寫資料</div>
    <div class="form-wrap">
      <div class="field"><label>姓名 *</label><input id="iName" placeholder="請輸入您的姓名"></div>
      <div class="field"><label>電話 *</label><input id="iPhone" type="tel" placeholder="請輸入聯絡電話"></div>
      <div class="field"><label>電子信箱（選填）</label><input id="iEmail" type="email" placeholder="yourname@gmail.com"></div>
      <div class="field"><label>備註（選填）</label><textarea id="iNote" rows="3" placeholder="如有特殊需求…"></textarea></div>
      <div class="cancel-box">
        <p>⚠️ 取消預約請於前一日至官方帳號告知<br>LINE 官方帳號：<a href="https://lin.ee/pscg9XZ" target="_blank" style="color:var(--gold)">點此聯絡</a></p>
      </div>
    </div>
    <div id="formErr" class="msg"></div>
    <div style="height:80px"></div>
    <div class="sticky">
      <button class="btn-main" id="submitBtn" onclick="submitBooking()">確認送出預約 ✓</button>
    </div>
  </div>

  <!-- STEP 4: SUCCESS -->
  <div class="step-view" id="step4">
    <div class="success-wrap">
      <div class="success-divider"></div>
      <div class="success-title">預約成功</div>
      <div class="success-divider"></div>
      <div class="success-sub" id="successMsg" style="font-size:0.85rem;color:var(--text2);line-height:1.9;margin-top:16px"></div>
      <div style="margin-top:28px">
        <button onclick="location.reload()" style="background:none;border:1px solid rgba(201,162,39,0.4);color:var(--gold);border-radius:10px;padding:12px 28px;font-size:0.85rem;cursor:pointer;font-family:inherit">← 返回首頁</button>
      </div>
    </div>
  </div>

</div>

<!-- ══ ADMIN VIEW ══ -->
<div class="view" id="view-admin">
  <div class="admin-wrap">

    <!-- LOGIN -->
    <div id="adminLogin">
      <div class="admin-login">
        <h3 style="font-family:'Noto Serif TC',serif;color:var(--gold);margin-bottom:16px">🔐 後台管理</h3>
        <div class="field"><label>管理員密碼</label><input type="password" id="adminPwd" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')doAdminLogin()"></div>
        <button class="btn btn-gold" onclick="doAdminLogin()" style="width:100%;margin-top:8px">登入</button>
        <div id="adminErr" style="color:#e88;font-size:0.8rem;margin-top:8px;display:none"></div>
      </div>
    </div>

    <!-- PANEL -->
    <div id="adminPanel" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-size:0.85rem;color:var(--gold);font-family:'Noto Serif TC',serif">⚙️ 後台管理</div>
        <button onclick="doAdminLogout()" style="font-size:0.72rem;color:var(--text3);background:none;border:none;cursor:pointer">登出</button>
      </div>

      <!-- STATS -->
      <div class="admin-stats" id="adminStats"></div>

      <!-- ADMIN TABS -->
      <div class="admin-tabs">
        <button class="btn-tab on" onclick="showAdminTab('bookings',this)">📋 預約紀錄</button>
        <button class="btn-tab" onclick="showAdminTab('services',this)">💼 服務管理</button>
        <button class="btn-tab" onclick="showAdminTab('notices',this)">✉️ 注意事項</button>
      </div>

      <div id="adminBookings"></div>
      <div id="adminServices" style="display:none"></div>
      <div id="adminNotices" style="display:none"></div>
    </div>

  </div>
</div>

</div><!-- end app -->

<script>
// ══ CONFIG ══
const CFG = {
  EMAILJS_SERVICE:  'service_5ylrv7f',
  EMAILJS_TEMPLATE: 'template_wqugwja',
  EMAILJS_PUBLIC:   'RliHSmYpPbKAfoVFn',
  MAKE_WEBHOOK:     'https://hook.eu2.make.com/buq9jsnn73y2cgffexx1ay2sd9sn801z',
  GAS_URL:          'https://script.google.com/macros/s/AKfycbwx97t_82w6ALhK-MgbmJx9zwpNo_lLrRmU6umof8wEgqfUE9zv_rtbgiUYbbf25JPC/exec',
  LINE_URL:         'https://lin.ee/pscg9XZ',
  ADMIN_PW:         'Mo8899',
};

// ══ DEFAULT SERVICES ══
const DEFAULT_SVCS = [
  {id:'yuanchen',   name:'全台首創重建元辰宮',   desc:'客製化心靈建構｜讓你完全翻轉人生，重建生命藍圖｜過程大約 2～2.5 小時', price:8800, duration:3, tags:['線上 / 現場'], active:true},
  {id:'deep',       name:'元辰宮深化教準',        desc:'30 分鐘｜現場 or 線上｜須觀過第一次元辰宮',                              price:1500, duration:1, tags:['線上 / 現場'], lineNote:true, active:true},
  {id:'wealth',     name:'財富能量調整',           desc:'每月財富調頻，每月農曆 30 日前報名，初一啟動，每月可報名一次',           price:1111, birthdayPrice:888, duration:1, tags:['線上'], active:true},
  {id:'consult',    name:'線上諮詢服務',           desc:'15 分鐘｜線上',                                                          price:600,  duration:1, tags:['線上'], lineNote:true, active:true},
  {id:'energy',     name:'諮詢能量調頻',           desc:'40 分鐘｜線上 or 現場',                                                  price:1800, duration:1, tags:['線上 / 現場'], active:true},
  {id:'ancestor',   name:'超渡祖先 亡靈',          desc:'每位計費｜預約後請至官方帳號說明超渡內容',                               price:8600, duration:1, tags:['線上'], lineRequired:true, active:true},
  {id:'baby',       name:'超渡嬰靈',               desc:'每位計費｜預約後請至官方帳號說明超渡內容',                               price:2000, duration:1, tags:['線上'], lineRequired:true, active:true},
  {id:'surgery',    name:'現場手術台連線',          desc:'小產手術現場聯線｜線上',                                                 price:3600, duration:1, tags:['線上'], active:true},
];

// ══ STATE ══
let isBday = false;
let services = JSON.parse(localStorage.getItem('mjr:services') || 'null') || DEFAULT_SVCS;
let notices = localStorage.getItem('mjr:notices') || '';
let bookedSlots = {};
let selSvc = null, selDate = null, selSlot = null;
let calYear, calMonth;
const now = new Date();
calYear = now.getFullYear();
calMonth = now.getMonth();

// ══ INIT ══
document.addEventListener('DOMContentLoaded', () => {
  renderSvcs();
  loadEmailJS();
  fetchBooked();
});

function loadEmailJS() {
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
  s.onload = () => emailjs.init(CFG.EMAILJS_PUBLIC);
  document.head.appendChild(s);
}

async function fetchBooked() {
  try {
    const res = await fetch(CFG.GAS_URL + '?action=getBooked');
    const data = await res.json();
    bookedSlots = data || {};
  } catch(e) { bookedSlots = {}; }
}

// ══ BIRTHDAY ══
function toggleBday() {
  isBday = !isBday;
  document.getElementById('bdayToggle').classList.toggle('on', isBday);
  renderSvcs();
}

// ══ VIEW NAV ══
function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('on'));
  document.getElementById('view-' + name).classList.add('on');
  if(btn) btn.classList.add('on');
  if(name === 'admin') initAdmin();
}

function goStep(n) {
  document.querySelectorAll('.step-view').forEach(v => v.classList.remove('on'));
  document.getElementById('step' + n).classList.add('on');
  window.scrollTo(0,0);
  if(n === 2) { renderCal(); selSlot = null; document.getElementById('toStep3').disabled = true; document.getElementById('timeSection').style.display = 'none'; }
  if(n === 3) renderSummary();
}

// ══ SERVICES ══
function getPrice(s) {
  if(!isBday) return s.price;
  if(s.birthdayPrice !== undefined) return s.birthdayPrice;
  return Math.round(s.price * 0.8);
}

function renderSvcs() {
  const el = document.getElementById('svcList');
  el.innerHTML = '';
  services.filter(s => s.active).forEach(s => {
    const p = getPrice(s);
    const orig = isBday ? s.price : null;
    const div = document.createElement('div');
    div.className = 'svc-card' + (selSvc?.id === s.id ? ' sel' : '');
    div.onclick = () => { selSvc = s; renderSvcs(); document.getElementById('toStep2').disabled = false; };
    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="svc-name">${s.name}</div>
        <div style="text-align:right;margin-left:12px;flex-shrink:0">
          ${orig ? `<div style="font-size:0.72rem;color:var(--text3);text-decoration:line-through">$${orig.toLocaleString()}</div>` : ''}
          <div class="svc-price">$${p.toLocaleString()}</div>
        </div>
      </div>
      <div class="svc-desc">${s.desc}</div>
      <div>${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}${s.lineRequired?`<span class="line-tag">📲 預約後請至官方帳號說明超渡內容</span>`:''}</div>
    `;
    el.appendChild(div);
  });
}

// ══ CALENDAR ══
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DAYS = ['日','一','二','三','四','五','六'];

function changeMonth(d) {
  calMonth += d;
  if(calMonth < 0) { calMonth = 11; calYear--; }
  if(calMonth > 11) { calMonth = 0; calYear++; }
  renderCal();
}

function renderCal() {
  document.getElementById('monthLabel').textContent = `${calYear} 年 ${MONTHS[calMonth]}`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  DAYS.forEach(d => { const el = document.createElement('div'); el.className = 'cal-dh'; el.textContent = d; grid.appendChild(el); });

  const first = new Date(calYear, calMonth, 1).getDay();
  const days = new Date(calYear, calMonth+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  for(let i = 0; i < first; i++) { const el = document.createElement('div'); el.className = 'cal-day emp'; grid.appendChild(el); }

  for(let d = 1; d <= days; d++) {
    const date = new Date(calYear, calMonth, d);
    const dow = date.getDay();
    const ds = fmtDate(date);
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;

    const isPast = date < today;
    const isSun = dow === 0;
    const disabled = isPast || isSun;

    if(disabled) { el.classList.add('dis'); }
    else {
      if(date.toDateString() === today.toDateString()) el.classList.add('tod');
      if(selDate === ds) el.classList.add('sel');
      el.onclick = () => { selDate = ds; selSlot = null; document.getElementById('toStep3').disabled = true; renderCal(); renderSlots(); document.getElementById('timeSection').style.display = 'block'; };
    }
    grid.appendChild(el);
  }
}

// ══ SLOTS ══
function isRestr(ds, h) {
  const today = new Date(); today.setHours(0,0,0,0);
  const sd = new Date(ds); sd.setHours(0,0,0,0);
  const diff = Math.round((sd - today) / 86400000);
  const nowH = new Date().getHours();

  if(diff > 1) return false;
  if(diff === 0) {
    if(nowH < 12) return h < 16;
    return true;
  }
  if(diff === 1) {
    if(nowH >= 12 && nowH < 16) return h >= 12;
    if(nowH >= 16) return h < 12 || h >= 16;
    return false;
  }
  return false;
}

function isBooked(ds, h, dur) {
  const booked = bookedSlots[ds] || [];
  for(let i = 0; i < dur; i++) {
    const bh = h + i;
    if(booked.includes(`${String(bh).padStart(2,'0')}:00`)) return true;
  }
  return false;
}

function renderSlots() {
  const grid = document.getElementById('slotsGrid');
  const noMsg = document.getElementById('noSlots');
  const note = document.getElementById('cutoffNote');
  grid.innerHTML = ''; noMsg.style.display = 'none'; note.style.display = 'none';
  if(!selDate || !selSvc) return;

  const dow = new Date(selDate).getDay();
  const isSat = dow === 6;
  const maxH = isSat ? 14 : 18;
  const dur = selSvc.duration || 1;

  const nowH = new Date().getHours();
  const today = new Date(); today.setHours(0,0,0,0);
  const sd = new Date(selDate); sd.setHours(0,0,0,0);
  const diff = Math.round((sd - today) / 86400000);

  if(diff <= 1) {
    const msgs = {
      0: nowH < 12 ? '⏰ 今日限預約晚上時段（16:00 以後）' : '',
      1: nowH >= 12 && nowH < 16 ? '⏰ 明日限預約早上時段（10:00–11:00）' : nowH >= 16 ? '⏰ 明日限預約中午時段（12:00–15:00）' : ''
    };
    if(msgs[diff]) { note.textContent = msgs[diff]; note.style.display = 'block'; }
  }

  let hasAny = false;
  for(let h = 10; h <= maxH; h++) {
    const ts = `${String(h).padStart(2,'0')}:00`;
    const restr = isRestr(selDate, h);
    const locked = isBooked(selDate, h, dur);
    const el = document.createElement('div');
    el.className = 'slot';
    if(locked) el.classList.add('locked');
    else if(restr) el.classList.add('restr');
    else hasAny = true;
    if(selSlot === ts && !locked && !restr) el.classList.add('sel');
    el.innerHTML = `<div class="st">${ts}</div><div class="sa">${locked ? '已預約' : restr ? '不可預約' : getSession(h)}</div>`;
    if(!locked && !restr) el.onclick = () => { selSlot = ts; renderSlots(); document.getElementById('toStep3').disabled = false; };
    grid.appendChild(el);
  }
  if(!hasAny) { noMsg.style.display = 'block'; noMsg.textContent = '此日期無可用時段，請選擇其他日期 🙏'; }
}

function getSession(h) { return h < 12 ? '早上' : h < 16 ? '中午' : '晚上'; }

// ══ SUMMARY ══
function renderSummary() {
  const s = selSvc, p = getPrice(s);
  const dl = new Date(selDate).toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  document.getElementById('summaryBox').innerHTML = `
    <div class="sum-row"><span class="sum-label">服務</span><span class="sum-val">${s.name}</span></div>
    <div class="sum-row"><span class="sum-label">日期</span><span class="sum-val">${dl}</span></div>
    <div class="sum-row"><span class="sum-label">時段</span><span class="sum-val">${selSlot}</span></div>
    ${isBday ? '<div class="sum-row"><span class="sum-label">優惠</span><span class="sum-val" style="color:var(--gold)">🎂 本月壽星 8 折</span></div>' : ''}
    <div class="sum-row total"><span class="sum-label">費用</span><span class="sum-val">$${p.toLocaleString()}</span></div>
  `;
}

// ══ SUBMIT ══
async function submitBooking() {
  const name = document.getElementById('iName').value.trim();
  const phone = document.getElementById('iPhone').value.trim();
  const email = document.getElementById('iEmail').value.trim();
  const note = document.getElementById('iNote').value.trim();
  const err = document.getElementById('formErr');

  if(!name || !phone) { err.textContent = '⚠️ 姓名和電話為必填欄位'; err.className = 'msg err'; return; }
  err.className = 'msg';

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>送出中…';

  const s = selSvc, p = getPrice(s);
  const dl = new Date(selDate).toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

  const payload = {
    event: 'new_booking',
    booking_id: 'BK' + Date.now(),
    name, phone, email,
    service: s.name,
    price: p,
    date: selDate,
    slot: selSlot,
    dateSlot: selDate + ' ' + selSlot,
    note,
    created_at: new Date().toISOString(),
  };

  try {
    await fetch(CFG.MAKE_WEBHOOK, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload),
      mode:'no-cors',
    });

    if(email && typeof emailjs !== 'undefined') {
      await emailjs.send(CFG.EMAILJS_SERVICE, CFG.EMAILJS_TEMPLATE, {
        to_name: name, to_email: email,
        service_name: s.name,
        booking_date: dl,
        booking_time: selSlot,
        booking_price: `$${p.toLocaleString()}`,
        line_url: CFG.LINE_URL,
      });
    }

    // Lock slot locally
    if(!bookedSlots[selDate]) bookedSlots[selDate] = [];
    for(let i = 0; i < s.duration; i++) {
      const bh = parseInt(selSlot) + i;
      bookedSlots[selDate].push(`${String(bh).padStart(2,'0')}:00`);
    }

    goStep(4);
    document.getElementById('successMsg').innerHTML = `
      <b>${name}</b> 您好，您的預約已確認 ✨<br><br>
      📅 ${dl}<br>🕐 ${selSlot}<br>💫 ${s.name}<br>💰 $${p.toLocaleString()}${isBday?'（壽星 8 折）':''}<br>
      ${email ? `<br>確認信已寄至 ${email}<br>` : ''}
      ${s.lineRequired ? `<br>⚠️ 請至 <a href="${CFG.LINE_URL}" target="_blank" style="color:var(--gold)">LINE 官方帳號</a> 說明超渡內容<br>` : ''}
      <div class="ritual-box">
        我們會準時在線等候您。<br>
        請您提前 10 分鐘，找一個安靜的空間，<br>
        讓自己沉澱下來，帶著開放的心進入這段旅程。<br><br>
        時間會依照約定進行，若您延遲到來，<br>
        課程將依原定時間結束，敬請見諒。
      </div>
      <div style="font-size:0.75rem;color:var(--text3)">如需取消請於前一日至 <a href="${CFG.LINE_URL}" target="_blank" style="color:var(--gold)">LINE 官方帳號</a> 告知</div>
    `;

  } catch(e) {
    btn.disabled = false; btn.textContent = '確認送出預約 ✓';
    err.textContent = '送出失敗，請稍後再試或直接聯絡 LINE'; err.className = 'msg err';
  }
}

// ══ ADMIN ══
function doAdminLogin() {
  const pw = document.getElementById('adminPwd').value;
  const err = document.getElementById('adminErr');
  if(pw === CFG.ADMIN_PW) {
    document.getElementById('adminLogin').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadAdminBookings();
  } else {
    err.textContent = '密碼錯誤'; err.style.display = 'block';
  }
}

function doAdminLogout() {
  document.getElementById('adminLogin').style.display = 'block';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('adminPwd').value = '';
}

function showAdminTab(tab, btn) {
  ['bookings','services','notices'].forEach(t => document.getElementById('admin'+t.charAt(0).toUpperCase()+t.slice(1)).style.display = 'none');
  document.querySelectorAll('.admin-tabs .btn-tab').forEach(b => b.classList.remove('on'));
  document.getElementById('admin'+tab.charAt(0).toUpperCase()+tab.slice(1)).style.display = 'block';
  btn.classList.add('on');
  if(tab === 'bookings') loadAdminBookings();
  if(tab === 'services') renderAdminSvcs();
  if(tab === 'notices') renderAdminNotices();
}

function initAdmin() {
  const stats = document.getElementById('adminStats');
  stats.innerHTML = `
    <div class="stat-card"><div class="stat-val" id="sTot">—</div><div class="stat-label">總預約</div></div>
    <div class="stat-card"><div class="stat-val" id="sToday">—</div><div class="stat-label">今日</div></div>
    <div class="stat-card"><div class="stat-val" id="sRev">—</div><div class="stat-label">總金額</div></div>
  `;
}

async function loadAdminBookings() {
  const el = document.getElementById('adminBookings');
  el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text3)"><span class="spin"></span>載入中…</div>';
  try {
    const res = await fetch(CFG.GAS_URL + '?action=getAll');
    const data = await res.json();
    const rows = (data.bookings || []).filter(r => r[0]);
    const today = fmtDate(new Date());
    let rev = 0;
    rows.forEach(r => { rev += Number(r[4]) || 0; });
    document.getElementById('sTot').textContent = rows.length + ' 筆';
    document.getElementById('sToday').textContent = rows.filter(r => String(r[5]).startsWith(today) || String(r[5]) === today).length + ' 筆';
    document.getElementById('sRev').textContent = '$' + rev.toLocaleString();

    if(!rows.length) { el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text3)">尚無預約</div>'; return; }
    let html = '<div style="overflow-x:auto"><table class="admin-table"><thead><tr><th>日期</th><th>時段</th><th>姓名</th><th>電話</th><th>服務</th><th>金額</th></tr></thead><tbody>';
    rows.slice().reverse().forEach(r => {
      html += `<tr><td>${r[5]||''}</td><td>${r[6]||''}</td><td>${r[0]||''}</td><td>${r[2]||''}</td><td>${r[3]||''}</td><td>$${Number(r[4]).toLocaleString()}</td></tr>`;
    });
    html += '</tbody></table></div>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div style="text-align:center;padding:30px;color:#e88">載入失敗，請稍後再試</div>';
  }
}

function renderAdminSvcs() {
  const el = document.getElementById('adminServices');
  el.innerHTML = '';
  services.forEach((s,i) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.style.cssText = `margin-bottom:10px;opacity:${s.active?1:0.5}`;
    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-weight:600">${s.name}</div>
          <div style="font-size:0.75rem;color:var(--text3);margin-top:2px">${s.desc}</div>
          <div style="color:var(--gold);font-weight:700;margin-top:4px">$${s.price.toLocaleString()}</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="toggleSvc(${i})">${s.active?'隱藏':'顯示'}</button>
      </div>
    `;
    el.appendChild(div);
  });
}

function toggleSvc(i) {
  services[i].active = !services[i].active;
  localStorage.setItem('mjr:services', JSON.stringify(services));
  renderAdminSvcs();
  renderSvcs();
}

function renderAdminNotices() {
  const el = document.getElementById('adminNotices');
  el.innerHTML = `
    <div class="card">
      <div style="font-size:0.85rem;color:var(--gold);margin-bottom:12px;font-family:'Noto Serif TC',serif">📋 注意事項</div>
      <textarea id="noticeText" rows="8" style="margin-bottom:12px" placeholder="每行一條注意事項，客戶預約完成後可見">${notices}</textarea>
      <button class="btn btn-gold" onclick="saveNotices()" style="width:100%">儲存</button>
      <div id="noticeSaved" style="color:var(--green);font-size:0.8rem;margin-top:8px;display:none">✅ 已儲存</div>
    </div>
  `;
}

function saveNotices() {
  notices = document.getElementById('noticeText').value;
  localStorage.setItem('mjr:notices', notices);
  const el = document.getElementById('noticeSaved');
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2000);
}

// ══ UTILS ══
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
